// ============ State ============
let selectedObjId = null;
let editingItemId = null;

// ============ Init ============
function init() {
  renderTree();
  renderItems();
}
init();

function renderTree() {
  const container = document.getElementById('cnasTree');
  let html = `<div class="tree-node ${selectedObjId===null?'active':''}" onclick="selectObject(null)"><span style="font-size:10px;">📋</span>全部检测对象<span class="count">${cnasItems.length}</span></div>`;

  // Group header: 一、高分子及复合材料
  html += `<div style="font-size:12px;color:#888;padding:8px 16px 4px;font-weight:500;">一、高分子及复合材料</div>`;
  cnasObjects.forEach(obj => {
    const count = cnasItems.filter(it => it.obj_id===obj.id).length;
    if (count > 0) {
      html += `<div class="tree-node ${selectedObjId===obj.id?'active':''}" onclick="selectObject('${obj.id}')"><span style="font-size:10px;color:#999;">${obj.seq}.</span>${obj.name}<span class="count">${count}</span></div>`;
    }
  });
  container.innerHTML = html;
}

function selectObject(objId) {
  selectedObjId = objId;
  renderTree();
  renderItems();
}

function getDisplayItems() {
  let items = cnasItems;
  // Filter by object
  if (selectedObjId) {
    items = items.filter(it => it.obj_id === selectedObjId);
  }
  // Search filter
  const sn = (document.getElementById('searchName')?.value||'').trim().toLowerCase();
  const ss = (document.getElementById('searchStd')?.value||'').trim().toLowerCase();
  if (sn) items = items.filter(it => it.name.toLowerCase().includes(sn));
  if (ss) items = items.filter(it => it.std.toLowerCase().includes(ss));
  return items;
}

function filterItems() { renderItems(); }
function resetFilter() { document.getElementById('searchName').value = ''; document.getElementById('searchStd').value = ''; renderItems(); }

function renderItems() {
  const items = getDisplayItems();
  // Panel title
  let title = '全部检测项目/参数';
  if (selectedObjId) {
    const obj = cnasObjects.find(o => o.id === selectedObjId);
    if (obj) title = obj.name + ' — 检测项目/参数';
  }
  document.getElementById('panelTitle').textContent = title;
  document.getElementById('objItemCount').textContent = items.length;
  document.getElementById('objectSummary').style.display = selectedObjId ? 'flex' : 'none';

  let html = '';
  if (items.length === 0) {
    html = '<tr><td colspan="6" style="text-align:center;padding:32px;color:#ccc;">暂无匹配的检测项目/参数</td></tr>';
  } else {
    items.forEach(it => {
      const obj = cnasObjects.find(o => o.id === it.obj_id);
      const statusTag = it.status==='有效' ? '<span class="tag tag-green">有效</span>' : '<span class="tag tag-default">过期</span>';
      const noteHtml = it.note ? `<span class="note-badge">${esc(it.note)}</span>` : '—';
      html += `<tr>
        <td>${it.item_no||'—'}</td>
        <td>${esc(it.name)}</td>
        <td style="font-size:11px;color:#666;">${esc(it.std)}</td>
        <td style="font-size:11px;">${noteHtml}</td>
        <td>${statusTag}</td>
        <td>
          <button class="btn btn-ghost btn-xs" onclick="openItemDrawer('${it.id}')">编辑</button>
        </td>
      </tr>`;
    });
  }
  document.getElementById('itemTableBody').innerHTML = html;
}

// ============ Item Drawer ============
function openItemDrawer(itemId) {
  editingItemId = itemId || null;
  document.getElementById('drawerTitle').textContent = itemId ? '编辑检测项目/参数' : '新增检测项目/参数';

  // Populate object dropdown
  let opts = '';
  cnasObjects.forEach(obj => {
    opts += `<option value="${obj.id}">${obj.seq}. ${obj.name}</option>`;
  });
  document.getElementById('formObjId').innerHTML = opts;

  if (itemId) {
    const it = cnasItems.find(x => x.id === itemId);
    if (it) {
      document.getElementById('formObjId').value = it.obj_id;
      document.getElementById('formItemNo').value = it.item_no||'';
      document.getElementById('formItemName').value = it.name;
      document.getElementById('formStd').value = it.std;
      document.getElementById('formNote').value = it.note||'';
      document.getElementById('formEffDate').value = it.eff_date||'2026-01-20';
    }
  } else {
    document.getElementById('formObjId').value = selectedObjId || '';
    document.getElementById('formItemNo').value = '';
    document.getElementById('formItemName').value = '';
    document.getElementById('formStd').value = '';
    document.getElementById('formNote').value = '';
    document.getElementById('formEffDate').value = '2026-01-20';
  }
  document.getElementById('itemDrawer').classList.add('show');
}

function closeItemDrawer() {
  document.getElementById('itemDrawer').classList.remove('show');
  editingItemId = null;
}

function saveItem() {
  const name = document.getElementById('formItemName').value.trim();
  const objId = document.getElementById('formObjId').value;
  if (!name || !objId) { alert('请填写项目名称并选择检测对象'); return; }

  const data = {
    obj_id: objId,
    item_no: document.getElementById('formItemNo').value.trim(),
    name: name,
    std: document.getElementById('formStd').value.trim(),
    note: document.getElementById('formNote').value.trim(),
    eff_date: document.getElementById('formEffDate').value,
    status: '有效'
  };

  if (editingItemId) {
    const idx = cnasItems.findIndex(x => x.id === editingItemId);
    if (idx >= 0) { cnasItems[idx] = { ...cnasItems[idx], ...data }; }
  } else {
    data.id = 'c' + String(Math.floor(Math.random()*90000+10000));
    cnasItems.push(data);
  }

  closeItemDrawer();
  renderTree();
  renderItems();
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

// ============ Export / Import ============
function exportCNASData() {
  var items = getDisplayItems();
  var now = new Date().toISOString().slice(0,10);
  var header = '\uFEFF序号,所属检测对象,项目/参数名称,检测标准（方法）,说明,生效日期,状态';
  var rows = items.map(function(it, i) {
    var obj = cnasObjects.find(function(o) { return o.id === it.obj_id; });
    return [(i+1), obj?obj.name:'', it.name, it.std, it.note||'', it.eff_date||'', it.status].map(csvCell).join(',');
  });
  var csv = header + '\n' + rows.join('\n');
  var blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = 'CNAS资质项_' + now + '.csv'; a.click();
  URL.revokeObjectURL(url);
}
function downloadCNASTemplate() {
  var header = '\uFEFF所属检测对象,项目序号,项目/参数名称,检测标准（方法）,说明,生效日期,状态';
  var sample = '中小学合成材料面层,1,厚度,GB 36246-2018 附录 A,,2026-01-20,有效';
  var csv = header + '\n' + sample;
  var blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = 'CNAS资质项导入模板.csv'; a.click();
  URL.revokeObjectURL(url);
}
function handleCNASImport(input) {
  var file = input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    var text = e.target.result;
    var lines = text.split(/\r?\n/).filter(function(l) { return l.trim(); });
    if (lines.length < 2) { alert('文件无有效数据行'); input.value = ''; return; }
    var added = 0;
    for (var i = 1; i < lines.length; i++) {
      var cols = parseCSVLine(lines[i]);
      if (cols.length < 3) continue;
      var objName = (cols[0]||'').trim();
      var itemNo = (cols[1]||'').trim();
      var itemName = (cols[2]||'').trim();
      var std = (cols[3]||'').trim();
      var note = (cols[4]||'').trim();
      var effDate = (cols[5]||'').trim() || '2026-01-20';
      if (!itemName) continue;
      var obj = cnasObjects.find(function(o) { return o.name === objName; });
      var newId = 'c' + String(cnasItems.length + 100).slice(1);
      cnasItems.push({
        id: newId,
        obj_id: obj ? obj.id : 'obj01',
        item_no: itemNo || String(cnasItems.length + 1),
        name: itemName,
        std: std,
        note: note,
        eff_date: effDate,
        status: '有效'
      });
      added++;
    }
    if (added > 0) {
      renderTree();
      renderItems();
      alert('成功导入 ' + added + ' 条记录');
    }
    input.value = '';
  };
  reader.readAsText(file, 'UTF-8');
}
function csvCell(val) { var s = String(val==null?'':val); return /[,\n"]/.test(s) ? '"'+s.replace(/"/g,'""')+'"' : s; }
function parseCSVLine(line) {
  var result = [], current = '', inQuotes = false;
  for (var i = 0; i < line.length; i++) {
    var ch = line[i];
    if (inQuotes) {
      if (ch === '"') { if (line[i+1]==='"') { current += '"'; i++; } else inQuotes = false; }
      else current += ch;
    } else {
      if (ch === '"') inQuotes = true;
      else if (ch === ',') { result.push(current); current = ''; }
      else current += ch;
    }
  }
  result.push(current);
  return result;
}
