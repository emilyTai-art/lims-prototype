<html lang="zh-CN">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; background: #f0f2f5; color: #333; }
  .app { display: flex; min-height: 100vh; }

  .sidebar { width: 220px; background: #001529; color: #fff; flex-shrink: 0; }
  .sidebar .logo { padding: 20px; font-size: 18px; font-weight: 700; border-bottom: 1px solid rgba(255,255,255,.1); letter-spacing: 1px; }
  .sidebar .logo span { color: #1890ff; }
  .sidebar .menu-group { padding: 8px 0; }
  .sidebar .menu-group-title { padding: 12px 24px 4px; font-size: 12px; color: rgba(255,255,255,.45); text-transform: uppercase; }
  .sidebar .menu-item { padding: 10px 24px; cursor: pointer; font-size: 14px; transition: all .2s; display: flex; align-items: center; gap: 10px; color: rgba(255,255,255,.65); text-decoration: none; }
  .sidebar .menu-item:hover { background: rgba(255,255,255,.08); color: #fff; }
  .sidebar .menu-item.active { background: #1890ff; font-weight: 600; color: #fff; }
  .sidebar .menu-item .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,.5); }
  .sidebar .menu-item.active .dot { background: #fff; }
  .sidebar .menu-badge { margin-left: auto; background: #ff4d4f; color: #fff; font-size: 11px; padding: 1px 6px; border-radius: 10px; }

  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .topbar { height: 48px; background: #fff; border-bottom: 1px solid #e8e8e8; display: flex; align-items: center; padding: 0 24px; justify-content: space-between; font-size: 13px; color: #666; }
  .content { flex: 1; padding: 24px; overflow-y: auto; }
  .breadcrumb { font-size: 13px; color: #999; margin-bottom: 16px; }
  .breadcrumb a { color: #1890ff; text-decoration: none; }
  .breadcrumb span { color: #333; }
  .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .page-header h2 { font-size: 20px; font-weight: 600; }
  .card { background: #fff; border-radius: 4px; box-shadow: 0 1px 3px rgba(0,0,0,.08); padding: 24px; }

  .btn { height: 32px; padding: 0 16px; border-radius: 4px; font-size: 13px; cursor: pointer; border: 1px solid #d9d9d9; background: #fff; color: #333; display: inline-flex; align-items: center; gap: 6px; transition: all .2s; white-space: nowrap; }
  .btn:hover { border-color: #1890ff; color: #1890ff; }

  .btn-primary { background: #1890ff; border-color: #1890ff; color: #fff; }
  .btn-primary:hover { background: #40a9ff; border-color: #40a9ff; color: #fff; }
  .btn-danger { color: #ff4d4f; }
  .btn-danger:hover { border-color: #ff4d4f; color: #ff4d4f; }
  .btn-sm { height: 26px; padding: 0 10px; font-size: 12px; }
  .btn-xs { height: 22px; padding: 0 6px; font-size: 11px; }

  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 13px; color: #333; margin-bottom: 4px; font-weight: 500; }
  .form-group label .required { color: #ff4d4f; margin-left: 2px; }
  .form-group input, .form-group textarea, .form-group select { width: 100%; height: 34px; padding: 0 10px; border: 1px solid #d9d9d9; border-radius: 4px; font-size: 13px; outline: none; }
  .form-group input:focus, .form-group textarea:focus,.form-group select:focus { border-color: #1890ff; box-shadow: 0 0 0 2px rgba(24,144,255,.15); }
  .form-group .hint { font-size: 12px; color: #999; margin-top: 2px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-row4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 12px; }

  .section-title { font-size: 14px; font-weight: 600; margin: 24px 0 12px; padding-bottom: 8px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; justify-content: space-between; }
  .quick-tooltip { font-size: 11px; color: #999; background: #fafafa; padding: 4px 8px; border-radius: 2px; }

  .sample-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .sample-table th, .sample-table td { padding: 6px 4px; border: 1px solid #e8e8e8; vertical-align: top; }
  .sample-table th { background: #f5f5f5; font-weight: 500; color: #666; font-size:11px; white-space:nowrap; }
  .sample-table td input, .sample-table td select { height: 26px; font-size: 11px; border: 1px solid #d9d9d9; border-radius: 2px; padding: 0 4px; outline: none; }
  .sample-table td input:focus { border-color: #1890ff; }
  .items-sub-table { width: 100%; border-collapse: collapse; font-size: 10px; margin-top: 4px; }
  .items-sub-table th, .items-sub-table td { padding: 3px 2px; border: 1px solid #f0f0f0; font-size:10px; }
  .items-sub-table th { background: #fafafa; font-weight: 400; }
  .items-sub-table select, .items-sub-table input { height: 22px !important; font-size: 10px !important; }

  .price-summary { background: #fafafa; padding: 12px; border-radius: 4px; display: flex; justify-content: flex-end; gap: 24px; font-size: 14px; }
  .hint { font-size: 12px; color: #999; margin-top: 4px; }

  /* Drawer */
  .drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 1000; opacity: 0; visibility: hidden; transition: opacity .3s, visibility .3s; }
  .drawer-overlay.show { opacity: 1; visibility: visible; }
  .drawer { position: fixed; top: 0; right: 0; bottom: 0; width: 700px; background: #fff; box-shadow: -6px 0 20px rgba(0,0,0,.12); z-index: 1001; display: flex; flex-direction: column; transform: translateX(100%); transition: transform .3s cubic-bezier(.25,.8,.25,1); }
  .drawer-overlay.show .drawer { transform: translateX(0); }
  .drawer-header { padding: 16px 24px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
  .drawer-header h3 { font-size: 16px; font-weight: 600; }
  .drawer-close { width: 28px; height: 28px; border: none; background: transparent; font-size: 18px; cursor: pointer; color: #999; border-radius: 4px; display: flex; align-items: center; justify-content: center; }
  .drawer-close:hover { background: #f5f5f5; color: #333; }
  .drawer-body { flex: 1; padding: 8px 0 0; overflow-y: auto; }
  .drawer-footer { padding: 12px 24px; border-top: 1px solid #f0f0f0; display: flex; justify-content: flex-end; gap: 8px; flex-shrink: 0; }

  /* Item picker — tree-style checkbox list */
  .item-picker-l1tabs { display: flex; gap: 0; border-bottom: 1px solid #f0f0f0; padding: 0 24px; background: #fafafa; flex-shrink: 0; overflow-x: auto; }
  .item-picker-l1tab { padding: 8px 16px; font-size: 13px; cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; color: #666; transition: all .2s; }
  .item-picker-l1tab:hover { color: #1890ff; }
  .item-picker-l1tab.active { color: #1890ff; border-bottom-color: #1890ff; font-weight: 600; }
  .item-picker-l1tab .count { font-size: 11px; color: #999; margin-left: 4px; }
  .item-picker-scroll { flex: 1; overflow-y: auto; }
  .item-picker-section { padding: 0 24px 12px; }
  .item-picker-section-title { font-size: 13px; font-weight: 600; color: #333; padding: 10px 0 6px; border-bottom: 1px solid #f0f0f0; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
  .item-picker-section-title .pkg-badge { font-size: 11px; background: #f9f0ff; color: #722ed1; padding: 1px 8px; border-radius: 10px; }
  .item-picker-row { display: flex; align-items: center; padding: 6px 24px; font-size: 13px; border-bottom: 1px solid #fafafa; transition: background .15s; }
  .item-picker-row:hover { background: #f5f7fa; }
  .item-picker-row .checkbox-wrap { width: 20px; flex-shrink: 0; }
  .item-picker-row .checkbox-wrap input[type="checkbox"] { width: 14px; height: 14px; margin: 0; accent-color: #1890ff; cursor: pointer; }
  .item-picker-row .item-info { flex: 1; min-width: 0; }
  .item-picker-row .item-name { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item-picker-row .item-meta { font-size: 11px; color: #999; }
  .item-picker-row .item-price { font-size: 13px; font-weight: 500; color: #cf1322; white-space: nowrap; margin-left: 8px; }
  .item-picker-row .item-config { display: flex; gap: 10px; align-items: center; margin-left: 12px; flex-shrink: 0; font-size: 12px; }
  .item-picker-row .item-config label { display: flex; align-items: center; gap: 3px; cursor: pointer; white-space: nowrap; }
  .item-picker-row .item-config input[type="text"] { width: 70px; height: 26px; font-size: 12px; border: 1px solid #d9d9d9; border-radius: 4px; padding: 0 6px; outline: none; }
  .item-picker-row .item-config input[type="text"]:focus { border-color: #1890ff; }
  .item-picker-empty { padding: 24px; text-align: center; color: #ccc; font-size: 13px; }

  /* Selected summary bar */
  .item-picker-summary { border-top: 1px solid #f0f0f0; flex-shrink: 0; }
  .item-picker-summary-bar { padding: 8px 24px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; font-size: 13px; background: #fafafa; }
  .item-picker-summary-bar:hover { background: #f0f0f0; }
  .item-picker-summary-bar .summary-text { color: #666; }
  .item-picker-summary-bar .summary-text strong { color: #1890ff; }
  .item-picker-summary-bar .summary-toggle { font-size: 10px; color: #999; transition: transform .2s; }
  .item-picker-summary-bar .summary-toggle.open { transform: rotate(180deg); }
  .item-picker-summary-list { display: none; max-height: 200px; overflow-y: auto; border-top: 1px solid #f0f0f0; padding: 4px 0; }
  .item-picker-summary-list.show { display: block; }
  .item-picker-summary-item { display: flex; align-items: center; padding: 5px 24px; font-size: 12px; justify-content: space-between; }
  .item-picker-summary-item:hover { background: #fff7e6; }
  .item-picker-summary-item .remove-btn { color: #ff4d4f; cursor: pointer; font-size: 14px; margin-left: 8px; }

  /* 资质校验 红色异常 */
  .qual-warn-row { background: #fff2f0 !important; border-left: 3px solid #ff4d4f; }
  .qual-warn-tag { display: inline-block; background: #fff2f0; color: #ff4d4f; border: 1px solid #ffccc7; padding: 1px 6px; border-radius: 2px; font-size: 11px; font-weight: 500; cursor: help; position: relative; }
  .qual-warn-tag::after { content: attr(data-tip); position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%); background: #fff1f0; color: #ff4d4f; border: 1px solid #ffa39e; padding: 4px 10px; border-radius: 4px; font-size: 11px; white-space: nowrap; pointer-events: none; opacity: 0; transition: opacity .2s; z-index: 10; box-shadow: 0 2px 8px rgba(255,77,79,.15); }
  .qual-warn-tag:hover::after { opacity: 1; }
  .qual-warn-text { color: #ff4d4f; cursor: help; position: relative; }
  .qual-warn-text::after { content: attr(data-tip); position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%); background: #fff1f0; color: #ff4d4f; border: 1px solid #ffa39e; padding: 4px 10px; border-radius: 4px; font-size: 11px; white-space: nowrap; pointer-events: none; opacity: 0; transition: opacity .2s; z-index: 10; box-shadow: 0 2px 8px rgba(255,77,79,.15); }
  .qual-warn-text:hover::after { opacity: 1; }
  .qual-check-banner { padding: 8px 16px; border-radius: 4px; font-size: 12px; margin: 0 24px 8px; display: none; }
  .qual-check-banner.warn { background: #fff2f0; color: #ff4d4f; border: 1px solid #ffccc7; display: block; }
  .qual-check-banner.ok { background: #f6ffed; color: #52c41a; border: 1px solid #b7eb8f; display: block; }
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="logo">LIMS<span>系统</span></div>
    <div class="menu-group">
      <div class="menu-group-title">商务阶段</div>
      <a href="客户管理.html" class="menu-item"><span class="dot"></span>客户管理</a>
      <a href="委托单管理.html" class="menu-item active"><span class="dot"></span>委托单管理</a>
      <a href="合同管理.html" class="menu-item"><span class="dot"></span>合同管理</a>
    </div>
    <div class="menu-group">
      <div class="menu-group-title">基础业务信息管理</div>
      <a href="合同模板管理.html" class="menu-item"><span class="dot"></span>合同模板管理</a>
      <a href="价格管理.html" class="menu-item"><span class="dot"></span>价格管理</a>
      <a href="CMA资质项管理.html" class="menu-item"><span class="dot"></span>CMA资质项管理</a>
      <a href="CNAS资质项管理.html" class="menu-item"><span class="dot"></span>CNAS资质项管理</a>
      <a href="国家能力库.html" class="menu-item"><span class="dot"></span>国家能力库</a>
    </div>
    <div class="menu-group">
      <div class="menu-group-title">流程引擎</div>

      <a href="流程引擎-已办列表.html" class="menu-item"><span class="dot"></span>已办任务</a>
    </div>
  </div>

  <div class="main">
    <div class="topbar"><span>商务阶段</span><span>内勤部 · 张晓梅</span></div>
    <div class="content">
      <div class="breadcrumb">
        <a href="委托单管理.html">委托单管理</a> &gt; <span id="pageTitle">新建委托单</span>
      </div>
      <div class="page-header">
        <h2 id="pageHeaderTitle">新建委托单</h2>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-primary" onclick="saveIntention()">保存委托单</button>
          <button class="btn" onclick="saveDraft()">暂存</button>
          <button class="btn" onclick="window.location.href='委托单管理.html'">取消返回</button>
        </div>
      </div>

      <div class="card">
        <!-- 步骤1：客户与联系人 -->
        <div class="section-title"><span>步骤1：选择客户与联系人</span></div>
        <div class="form-row">
          <div class="form-group"><label>委托单位 <span class="required">*</span></label><select id="formCustomer" onchange="onCustomerChange()"><option value="">-- 请选择客户 --</option></select></div>
          <div class="form-group"><label>本次联系人 <span class="required">*</span></label><select id="formContact"><option value="">-- 请先选择客户 --</option></select></div>
        </div>

        <!-- 步骤2：基本信息 -->
        <div class="section-title"><span>步骤2：基本信息</span></div>
        <div class="form-row">
          <div class="form-group"><label>委托编号</label><input type="text" disabled style="background:#f5f5f5;color:#999;" value="系统自动生成"></div>
          <div class="form-group"><label>检验类别 <span class="required">*</span></label><select id="formInspectionType"><option value="委托检验">委托检验</option><option value="委托抽检">委托抽检</option><option value="定期检验">定期检验</option></select></div>
        </div>
        <div class="form-row4">
          <div class="form-group"><label>报告类型 <span class="required">*</span></label><select id="formReportType"><option value="判定">判定</option><option value="实测数据">实测数据</option></select></div>
          <div class="form-group"><label>报告份数</label><input type="number" id="formReportCopies" value="2" min="1"></div>
          <div class="form-group"><label>是否退样</label><select id="formReturnSample"><option value="0">否</option><option value="1">是</option></select></div>
          <div class="form-group"><label>报告出具方式</label><select id="formReportDelivery"><option value="电子">电子</option><option value="纸质">纸质</option></select></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>邮寄地址</label><input type="text" id="formMailAddress" placeholder="如需邮寄纸质报告，填写邮寄地址"></div>
          <div class="form-group"><label>见证方</label><input type="text" id="formWitness" placeholder="选填，如监理方、教育局等需体现在报告中的见证方"></div>
        </div>

        <!-- 步骤3：受检单位 & 样品 -->
        <div class="section-title"><span>步骤3：受检单位 & 样品</span> <span class="quick-tooltip">平铺子表录入，每行一个样品，同受检单位自动归类</span></div>
        <div style="overflow-x:auto;" id="sampleTableContainer"></div>
        <button class="btn btn-sm" style="margin-top:8px;border-style:dashed;width:100%;justify-content:center;" onclick="addSampleRow()">+ 添加样品行</button>

        <!-- 价格汇总 -->
        <div class="section-title"><span>价格汇总</span></div>
        <div class="price-summary">
          <span>折扣前总价：<strong style="color:#fa8c16;font-size:18px;" id="summaryTotal">¥0.00</strong></span>
          <span>申请优惠后金额：<input type="number" id="formDiscountAmount" placeholder="选填，如需优惠请填写" oninput="updatePriceSummary()" style="width:160px;padding:6px 10px;border:1px solid #d9d9d9;border-radius:4px;font-size:15px;font-weight:600;color:#52c41a;"></span>
        </div>
        <div class="hint">价格根据所选检测项目自动计算。如需优惠，填写优惠后金额，提交审批时将进入优惠价格审批环节（周总审批）</div>
      </div>
    </div>
  </div>
</div>

<!-- ====== Drawer: 检测项目选择 ====== -->
<div class="drawer-overlay" id="itemPickerDrawer">
  <div class="drawer">
    <div class="drawer-header">
      <h3>选择检测项目 <span style="font-size:12px;color:#999;font-weight:400;" id="itemPickerSubtitle"></span></h3>
      <button class="drawer-close" onclick="closeItemDrawer()">✕</button>
    </div>
    <div class="item-picker-l1tabs" id="itemPickerL1Tabs"></div>
    <div style="padding:8px 16px;border-bottom:1px solid #f0f0f0;flex-shrink:0;">

    </div>
    <div class="item-picker-scroll" id="itemPickerScroll"></div>
    <div class="qual-check-banner" id="qualCheckBanner"></div>
    <div class="item-picker-summary" id="itemPickerSummary">

    <div class="drawer-footer">
      <button class="btn" onclick="closeItemDrawer()">取消</button>

      <button class="btn btn-primary" onclick="closeItemDrawer()">确认选择</button>
    </div>
  </div>
</div>

function onItemSelect(ri, ii) {
  const selVal = document.getElementById(`sitem_${ri}_${ii}`).value;
  if (!selVal) return;

  // Check if it's a package (prefix "PKG_")
  if (selVal.startsWith('PKG_')) {
    const pkgId = parseInt(selVal.replace('PKG_',''));
    const pkg = packageItems.find(p => p.id === pkgId);
    if (pkg) {
      // Remove this single placeholder item
      const currentItem = sampleRows[ri].items[ii];
      // Replace with all package child items
      const pkgChildren = p.item_ids.map(iid => {
        const s = singleItems.find(x => x.id === iid);
        return s ? {
          test_item_name: s.item_name,
          test_standard: s.test_standard,
          test_method: s.test_method,
          limit_value: currentItem.limit_value,
          need_cma: currentItem.need_cma,
          need_cnas: currentItem.need_cnas,
          unit_price: s.unit_price,
          is_pkg_child: true,
          pkg_id: pkg.id,
          pkg_name: p.pkg_name,
        } : null;
      }).filter(Boolean);

      // Add a header row + children
      // Insert all items at current position
      sampleRows[ri].items.splice(ii, 1, ...pkgChildren);
      // Mark package benefit: show the package savings
      const totalSingle = pkgChildren.reduce((s,c) => s + c.unit_price, 0);
      if (pkg.package_price < totalSingle) {
        sampleRows[ri].items[ii].pkg_savings = '（打包优惠：单独合计¥' + totalSingle + '，打包价¥' + pkg.package_price + '）';
      }
    }
    updatePriceSummary();
    renderSampleTable();
    return;
  }

  // Individual item selected
  const itemId = parseInt(selVal);
  const s = singleItems.find(x => x.id === itemId);
  if (s) {
    sampleRows[ri].items[ii].test_item_name = s.item_name;
    sampleRows[ri].items[ii].test_standard = s.test_standard;
    sampleRows[ri].items[ii].test_method = s.test_method;
    sampleRows[ri].items[ii].unit_price = s.unit_price;
    sampleRows[ri].items[ii].is_pkg_child = false;
    updatePriceSummary();
    renderSampleTable();
  }
}

// ============ 系统资质校验 ============
function doQualCheck() {
  const ri = itemDrawerRi;
  const r = sampleRows[ri];
  if (!r) return;
  const items = r.items.filter(function(it) { return it.test_item_name; });
  if (items.length === 0) {
    var banner = document.getElementById('qualCheckBanner');
    banner.className = 'qual-check-banner warn';
    banner.textContent = '当前样品未选择任何检测项目，无法校验';
    return;
  }
  var warnCount = 0;
  items.forEach(function(it) {
    var key = (it.test_item_name||'') + '|' + (it.test_standard||'');
    var lib = mockQualLibrary[key];
    it.qual_warn = false;
    it.qual_warn_msg = '';
    var msgs = [];
    if (!lib) {
      // 该组合完全不在资质库中
      msgs.push('该检测项目&标准组合不在系统资质库中');
    } else {
      if (it.need_cma && !lib.cma) msgs.push('CMA资质项不存在于系统资质库中');
      if (it.need_cnas && !lib.cnas) msgs.push('CNAS资质项不存在于系统资质库中');
    }
    if (msgs.length > 0) {
      it.qual_warn = true;
      it.qual_warn_msg = msgs.join('；');
      warnCount++;
    }
  });
  var banner = document.getElementById('qualCheckBanner');
  if (warnCount > 0) {
    banner.className = 'qual-check-banner warn';
    banner.textContent = '资质校验：' + warnCount + ' 项异常（红色高亮），请核实检测项目&标准是否在CMA/CNAS资质库范围内';
  } else {
    banner.className = 'qual-check-banner ok';
    banner.textContent = '资质校验通过：所有已选项目均匹配系统资质库';
    // 3秒后自动隐藏绿色通过提示
    setTimeout(function() { banner.className = 'qual-check-banner'; }, 3000);
  }
  renderItemDrawer();
  renderSummary();
  renderSampleTable();
  updatePriceSummary();
}

  const selectedMap = getSelectedMap();
  const searchText = (document.getElementById('itemSearchInput').value || '').toLowerCase();

  // Filter helper
  function filterBySearch(items) {
    if (!searchText) return items;
    return items.filter(function(s) { return (s.item_name||'').toLowerCase().indexOf(searchText) >= 0; });
  }

  let html = '';

  // --- 打包项目 (filtered by L1) ---
  const visiblePkgs = packageItems.filter(pkg => {
    if (!itemPickerL1) return true;
    for (const l1 of bizTypeTree) {
      if (l1.id === itemPickerL1) {
        const ids = []; function c(n) { ids.push(n.id); if (n.children) n.children.forEach(c); }
        c(l1);
        return ids.includes(pkg.biz_type_id);
      }
    }
    return true;
  }).filter(pkg => {
    if (!searchText) return true;
    return (pkg.pkg_name||'').toLowerCase().indexOf(searchText) >= 0;
  });

  if (visiblePkgs.length > 0) {
    html += `<div class="item-picker-section"><div class="item-picker-section-title">📦 打包项目 <span class="pkg-badge">选打包=全选子项</span></div>`;
    visiblePkgs.forEach(pkg => {
      const childItems = pkg.item_ids.map(iid => singleItems.find(s => s.id === iid)).filter(Boolean);
      const allChildSelected = childItems.every(s => {
        const key = (s.item_name||'') + '|' + (s.test_standard||'');
        return !!selectedMap[key];
      });
      html += `<div class="item-picker-row" style="background:#fafafa;">
        <div class="checkbox-wrap"><input type="checkbox" id="ip_pkg_${pkg.id}" ${allChildSelected&&childItems.length>0?'checked':''} onchange="togglePackageCheck(${pkg.id})"></div>
        <div class="item-info"><div class="item-name">📦 ${pkg.pkg_name}</div><div class="item-meta">${pkg.item_ids.length}项：${childItems.map(s=>s.item_name).join('、')}</div></div>
        <div class="item-price">¥${pkg.package_price}/${pkg.unit||'组'}</div>
      </div>`;
    });
    html += `</div>`;
  }

  // --- 单项项目 (grouped by full path, filtered by L1 + search) ---
  const bizGroups = {};
  singleItems.forEach(s => {
    // L1 filter
    if (itemPickerL1) {
      const l1Id = s.biz_type_id.substring(0, 4);
      if (l1Id !== itemPickerL1) return;
    }
    // Search filter
    if (searchText && (s.item_name||'').toLowerCase().indexOf(searchText) < 0) return;
    const path = getBizTypePath(s.biz_type_id);
    if (!bizGroups[path]) bizGroups[path] = [];
    bizGroups[path].push(s);
  });

  if (Object.keys(bizGroups).length > 0) {
    html += `<div class="item-picker-section"><div class="item-picker-section-title">🔬 单项检测项目</div>`;
    Object.keys(bizGroups).forEach(path => {
      html += `<div class="item-picker-section-title" style="font-weight:400;font-size:12px;color:#666;border:none;padding:6px 0 2px;">${path}</div>`;
      bizGroups[path].forEach(s => {
        const key = (s.item_name||'') + '|' + (s.test_standard||'');
        const cur = selectedMap[key];
        const checked = !!cur;
        const warnClass = (cur && cur.qual_warn) ? ' qual-warn-row' : '';
        const warnTag = (cur && cur.qual_warn) ? ' <span class="qual-warn-tag" data-tip="'+(cur.qual_warn_msg||'')+'">⚠</span>' : '';
        html += `<div class="item-picker-row${warnClass}" id="ip_row_${ri}_${s.id}">
          <div class="checkbox-wrap"><input type="checkbox" ${checked?'checked':''} onchange="toggleSingleCheck(${ri},${s.id},this.checked)"></div>
          <div class="item-info"><div class="item-name">${s.item_name}${warnTag}</div><div class="item-meta">标准：${s.test_standard||'—'} | 方法：${s.test_method||'—'}</div></div>
          <div class="item-price">¥${s.unit_price}/${s.unit||'样'}</div>
          <div class="item-config" id="ip_cfg_${ri}_${s.id}" style="${checked?'':'display:none'}">
            <label><input type="checkbox" ${cur&&cur.need_cma?'checked':''} onchange="updateItemConfig(${ri},${s.id},'need_cma',this.checked?1:0)">CMA</label>
            <label><input type="checkbox" ${cur&&cur.need_cnas?'checked':''} onchange="updateItemConfig(${ri},${s.id},'need_cnas',this.checked?1:0)">CNAS</label>
            <input type="text" placeholder="限量值" value="${cur&&cur.limit_value?esc(cur.limit_value):''}" onchange="updateItemConfig(${ri},${s.id},'limit_value',this.value)">
          </div>
        </div>`;
      });
    });
    html += `</div>`;
  }

  document.getElementById('itemPickerScroll').innerHTML = html || '<div class="item-picker-empty">暂无可选项目</div>';
  renderSummary();
}

// ============ 底部已选汇总 ============
function renderSummary() {
  const r = sampleRows[itemDrawerRi];
  const items = r ? r.items.filter(it => it.test_item_name) : [];
  document.getElementById('summaryItemCount').textContent = items.length;

  const container = document.getElementById('summaryList');
  if (items.length === 0) {
    container.innerHTML = '<div style="padding:16px;text-align:center;color:#ccc;font-size:12px;">暂未选择检测项目</div>';
  } else {
    container.innerHTML = items.map((it, ii) => `
      <div class="item-picker-summary-item${it.qual_warn?' qual-warn-row':''}">
        <span style="flex:1;min-width:0;">
          <span style="font-weight:500;">${it.test_item_name}</span>
          <span style="color:#999;margin-left:6px;">${it.test_standard||'—'}</span>
          <span style="color:#cf1322;margin-left:8px;">¥${it.unit_price}</span>
          ${it.qual_warn ? '<span class="qual-warn-tag" data-tip="'+(it.qual_warn_msg||'')+'">⚠资质异常</span>' : ''}
        </span>
        <span style="color:#999;font-size:11px;white-space:nowrap;">${it.need_cma?'CMA':''}${it.need_cma&&it.need_cnas?'/':''}${it.need_cnas?'CNAS':''}</span>
        <span class="remove-btn" onclick="event.stopPropagation();removeItemByKey(${itemDrawerRi},'${(it.test_item_name||'').replace(/'/g,"\\'")}|${(it.test_standard||'').replace(/'/g,"\\'")}');renderItemDrawer();renderSampleTable();updatePriceSummary();" title="移除">×</span>
      </div>
    `).join('');
  }
}

function toggleSummaryList() {
  const list = document.getElementById('summaryList');
  const toggle = document.getElementById('summaryToggle');
  list.classList.toggle('show');
  toggle.classList.toggle('open');
}

function togglePackageCheck(pkgId) {
  const cb = document.getElementById('ip_pkg_'+pkgId);
  const pkg = packageItems.find(p => p.id === pkgId);
  if (!pkg) return;

  const childItems = pkg.item_ids.map(iid => singleItems.find(s => s.id === iid)).filter(Boolean);

  if (cb.checked) {
    // Add all child items to sample row
    childItems.forEach(s => {
      addOrEnsureItem(itemDrawerRi, s);
    });
  } else {
    // Remove all child items
    childItems.forEach(s => {
      removeItemByKey(itemDrawerRi, (s.item_name||'') + '|' + (s.test_standard||''));
    });
  }
  renderItemDrawer();
  renderSampleTable();
  updatePriceSummary();
}

function toggleSingleCheck(ri, itemId, checked) {
  const s = singleItems.find(x => x.id === itemId);
  if (!s) return;

  if (checked) {
    addOrEnsureItem(ri, s);
  } else {
    removeItemByKey(ri, (s.item_name||'') + '|' + (s.test_standard||''));
  }
  renderItemDrawer();
  renderSampleTable();
  updatePriceSummary();
}

function addOrEnsureItem(ri, s) {
  const key = (s.item_name||'') + '|' + (s.test_standard||'');
  const exists = sampleRows[ri].items.find(it => {
    return ((it.test_item_name||'') + '|' + (it.test_standard||'')) === key;
  });
  if (!exists) {
    sampleRows[ri].items.push({
      test_item_name: s.item_name,
      test_standard: s.test_standard,
      test_method: s.test_method,
      limit_value: '',
      need_cma: 1,
      need_cnas: 0,
      unit_price: s.unit_price,
      is_pkg_child: false,
    });
  }
}

function removeItemByKey(ri, key) {
  sampleRows[ri].items = sampleRows[ri].items.filter(it => {
    return ((it.test_item_name||'') + '|' + (it.test_standard||'')) !== key;
  });
}

function updateItemConfig(ri, itemId, field, value) {
  const s = singleItems.find(x => x.id === itemId);
  if (!s) return;
  const key = (s.item_name||'') + '|' + (s.test_standard||'');
  const it = sampleRows[ri].items.find(it => {
    return ((it.test_item_name||'') + '|' + (it.test_standard||'')) === key;
  });
  if (it) it[field] = value;
}

// Close drawer on overlay click
document.getElementById('itemPickerDrawer').addEventListener('click', function(e) {
  if (e.target === this) this.classList.remove('show');
});
</script>
</body>
</html>
