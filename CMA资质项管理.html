// ============ State ============
let selectedCatId = null;
let editingItemId = null;

// ============ Init ============
function init() {
  renderTree();
  renderItems();
}
init();

function renderTree() {
  const container = document.getElementById('cmaTree');
  let html = `<div class="tree-node ${selectedCatId===null?'active':''}" onclick="selectCategory(null)"><span style="font-size:10px;">📋</span>全部项目<span class="count">${cmaItems.length}</span></div>`;
  cmaCategories.forEach(cat => {
    const catItems = cmaItems.filter(it => it.cat_id.startsWith(cat.id));
    const catCount = catItems.length;
    const expanded = selectedCatId && selectedCatId.startsWith(cat.id);
    html += `<div class="tree-node ${selectedCatId===cat.id?'active':''}" onclick="toggleCat('${cat.id}')">
      <span class="arrow${expanded?' expanded':''}">▶</span>${cat.name}<span class="count">${catCount}</span>
    </div>`;
    html += `<div class="tree-children${expanded?' show':''}" id="tc_${cat.id}">`;
    (cat.children||[]).forEach(child => {
      const childItems = cmaItems.filter(it => it.cat_id===child.id);
      html += `<div class="tree-child ${selectedCatId===child.id?'active':''}" onclick="selectCategory('${child.id}')">${child.name}<span class="count" style="margin-left:auto;font-size:11px;color:#999;">${childItems.length}</span></div>`;
    });
    html += `</div>`;
  });
  container.innerHTML = html;
}

function toggleCat(catId) {
  if (selectedCatId === catId) {
    selectCategory(null);
  } else {
    selectCategory(catId);
  }
}

function selectCategory(catId) {
  selectedCatId = catId;
  renderTree();
  renderItems();
}

function getDisplayItems() {
  let items = cmaItems;
  // Filter by category
  if (selectedCatId) {
    // Check if it's a parent or child
    const parent = cmaCategories.find(c => c.id === selectedCatId);
    if (parent) {
      items = items.filter(it => it.cat_id.startsWith(selectedCatId));
    } else {
      items = items.filter(it => it.cat_id === selectedCatId);
    }
  }
  // Search filter
  const sn = (document.getElementById('searchName')?.value||'').trim().toLowerCase();
  const ss = (document.getElementById('searchStd')?.value||'').trim().toLowerCase();
  if (sn) items = items.filter(it => it.name.toLowerCase().includes(sn));
  if (ss) items = items.filter(it => it.std.toLowerCase().includes(ss));
  return items;
}

function filterItems() {
  renderItems();
}

function resetFilter() {
  document.getElementById('searchName').value = '';
  document.getElementById('searchStd').value = '';
  renderItems();
}

function renderItems() {
  const items = getDisplayItems();
  // Panel title
  let catName = '全部检测项目';
  if (selectedCatId) {
    for (const cat of cmaCategories) {
      if (cat.id === selectedCatId) { catName = cat.name; break; }
      for (const child of (cat.children||[])) {
        if (child.id === selectedCatId) { catName = cat.name + ' / ' + child.name; break; }
      }
    }
  }
  document.getElementById('panelTitle').textContent = catName;
  document.getElementById('catItemCount').textContent = items.length;
  document.getElementById('categorySummary').style.display = selectedCatId ? 'flex' : 'none';

  let html = '';
  if (items.length === 0) {
    html = '<tr><td colspan="7" style="text-align:center;padding:32px;color:#ccc;">暂无匹配的检测项目</td></tr>';
  } else {
    items.forEach((it, idx) => {
      const statusTag = it.status==='有效' ? '<span class="tag tag-green">有效</span>' : '<span class="tag tag-default">过期</span>';
      html += `<tr>
        <td>${it.item_no||idx+1}</td>
        <td><strong>${esc(it.name)}</strong></td>
        <td style="font-size:11px;color:#666;">${esc(it.std)}</td>
        <td style="font-size:11px;color:#999;">${it.limit||'—'}</td>
        <td>${it.eff_date}</td>
        <td>${statusTag}</td>
        <td>
          <button class="btn btn-ghost btn-xs" onclick="openItemDrawer('${it.id}')">编辑</button>
        </td>
      </tr>`;
    });
  }
  document.getElementById('itemTableBody').innerHTML = html;
}

// ============ Item Drawer ============
function openItemDrawer(itemId) {
  editingItemId = itemId || null;
  document.getElementById('drawerTitle').textContent = itemId ? '编辑检测项目' : '新增检测项目';

  // Populate category dropdown
  let catOpts = '';
  cmaCategories.forEach(cat => {
    catOpts += `<optgroup label="${cat.name}">`;
    (cat.children||[]).forEach(child => {
      catOpts += `<option value="${child.id}">${cat.name} / ${child.name}</option>`;
    });
    catOpts += '</optgroup>';
  });
  document.getElementById('formCatId').innerHTML = catOpts;

  if (itemId) {
    const it = cmaItems.find(x => x.id === itemId);
    if (it) {
      document.getElementById('formCatId').value = it.cat_id;
      document.getElementById('formItemNo').value = it.item_no||'';
      document.getElementById('formItemName').value = it.name;
      document.getElementById('formStd').value = it.std;
      document.getElementById('formLimit').value = it.limit||'';
      document.getElementById('formNote').value = it.note||'';
      document.getElementById('formEffDate').value = it.eff_date||'2026-01-04';
    }
  } else {
    document.getElementById('formCatId').value = selectedCatId || '';
    document.getElementById('formItemNo').value = '';
    document.getElementById('formItemName').value = '';
    document.getElementById('formStd').value = '';
    document.getElementById('formLimit').value = '';
    document.getElementById('formNote').value = '';
    document.getElementById('formEffDate').value = '2026-01-04';
  }
  document.getElementById('itemDrawer').classList.add('show');
}

function closeItemDrawer() {
  document.getElementById('itemDrawer').classList.remove('show');
  editingItemId = null;
}

function saveItem() {
  const name = document.getElementById('formItemName').value.trim();
  const catId = document.getElementById('formCatId').value;
  if (!name || !catId) { alert('请填写检测项目名称并选择类别'); return; }

  const data = {
    cat_id: catId,
    item_no: document.getElementById('formItemNo').value.trim(),
    name: name,
    std: document.getElementById('formStd').value.trim(),
    limit: document.getElementById('formLimit').value.trim(),
    note: document.getElementById('formNote').value.trim(),
    eff_date: document.getElementById('formEffDate').value,
    status: '有效'
  };

  if (editingItemId) {
    const idx = cmaItems.findIndex(x => x.id === editingItemId);
    if (idx >= 0) { cmaItems[idx] = { ...cmaItems[idx], ...data }; }
  } else {
    data.id = 'cma' + String(Math.floor(Math.random()*90000+10000));
    cmaItems.push(data);
  }

  closeItemDrawer();
  renderTree();
  renderItems();
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

// ============ Export / Import ============
function exportCMAData() {
  var items = getDisplayItems();
  var now = new Date().toISOString().slice(0,10);
  var header = '\uFEFF序号,所属产品类别,项目/参数名称,检测标准（方法）,限制范围,说明,生效日期,状态';
  var rows = items.map(function(it, i) {
    var cat = getCategoryPath(it.cat_id);
    return [(i+1), cat, it.name, it.std, it.limit||'', it.note||'', it.eff_date||'', it.status].map(csvCell).join(',');
  });
  var csv = header + '\n' + rows.join('\n');
  var blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = 'CMA资质项_' + now + '.csv'; a.click();
  URL.revokeObjectURL(url);
}
function downloadCMATemplate() {
  var header = '\uFEFF所属产品类别,项目序号,项目/参数名称,检测标准（方法）,限制范围,说明,生效日期,状态';
  var sample = '合成材料面层,1,厚度,GB/T 34419-2017,,,2026-01-04,有效';
  var csv = header + '\n' + sample;
  var blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = 'CMA资质项导入模板.csv'; a.click();
  URL.revokeObjectURL(url);
}
function handleCMAImport(input) {
  var file = input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    var text = e.target.result;
    var lines = text.split(/\r?\n/).filter(function(l) { return l.trim(); });
    if (lines.length < 2) { alert('文件无有效数据行'); input.value = ''; return; }
    var added = 0;
    for (var i = 1; i < lines.length; i++) {
      var cols = parseCSVLine(lines[i]);
      if (cols.length < 3) continue;
      var catName = (cols[0]||'').trim();
      var itemNo = (cols[1]||'').trim();
      var itemName = (cols[2]||'').trim();
      var std = (cols[3]||'').trim();
      var limit = (cols[4]||'').trim();
      var note = (cols[5]||'').trim();
      var effDate = (cols[6]||'').trim() || '2026-01-04';
      if (!itemName) continue;
      var catId = findCatByPath(catName);
      var newId = 'cma' + String(cmaItems.length + 100).slice(1);
      cmaItems.push({
        id: newId,
        cat_id: catId || 'cat01_01',
        item_no: itemNo || String(cmaItems.length + 1),
        name: itemName,
        std: std,
        limit: limit,
        note: note,
        eff_date: effDate,
        status: '有效'
      });
      added++;
    }
    if (added > 0) {
      renderTree();
      renderItems();
      alert('成功导入 ' + added + ' 条记录');
    }
    input.value = '';
  };
  reader.readAsText(file, 'UTF-8');
}
function findCatByPath(name) {
  if (!name) return null;
  for (var i = 0; i < cmaCats.length; i++) {
    if (cmaCats[i].name === name) return cmaCats[i].id;
    if (cmaCats[i].children) {
      for (var j = 0; j < cmaCats[i].children.length; j++) {
        if (cmaCats[i].children[j].name === name) return cmaCats[i].children[j].id;
      }
    }
  }
  return null;
}
function csvCell(val) { var s = String(val==null?'':val); return /[,\n"]/.test(s) ? '"'+s.replace(/"/g,'""')+'"' : s; }
function parseCSVLine(line) {
  var result = [], current = '', inQuotes = false;
  for (var i = 0; i < line.length; i++) {
    var ch = line[i];
    if (inQuotes) {
      if (ch === '"') { if (line[i+1]==='"') { current += '"'; i++; } else inQuotes = false; }
      else current += ch;
    } else {
      if (ch === '"') inQuotes = true;
      else if (ch === ',') { result.push(current); current = ''; }
      else current += ch;
    }
  }
  result.push(current);
  return result;
}
