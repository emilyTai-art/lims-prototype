let currentDetail = null;

// ============ UTILS ============
function getCustomer(id) { return mockCustomers.find(c => c.id === id); }
function sTag(s) {
  const m = {'草稿':'blue','审批中':'orange','审批通过':'green','已结束':'purple'};
  return `<span class="tag tag-${m[s]||'default'}">${s}</span>`;
}
function vTag(s) {
  const m = {'待审批':'orange','通过':'green','已通过':'green','已驳回':'red'};
  return `<span class="tag tag-${m[s]||'default'}">${s}</span>`;
}

// ============ LIST ============
function renderList() {
  document.getElementById('tableBody').innerHTML = mockIntentions.map(i => {
    const c = getCustomer(i.customer_id);
    const cd = i.contract_no ? `<a href="javascript:void(0)" onclick="goToContract('${i.contract_no}')" style="color:#1890ff;">${i.contract_no}</a>` : '<span style="color:#ccc;">-</span>';
    return `<tr data-no="${i.intention_no}" data-customer="${c?c.company_name:''}" data-status="${i.status}" data-date="${i.created_at.slice(0,10)}">
      <td style="color:#1890ff;cursor:pointer;font-weight:600;" onclick="showDetail(${i.id})">${i.intention_no}</td>
      <td>${c?c.company_name:'-'}</td><td>${i.inspection_type}</td><td>${i.samples.length}</td>
      <td style="color:#fa8c16;">¥${i.total_price.toLocaleString()}</td>
      <td style="color:#52c41a;font-weight:600;">¥${i.final_price.toLocaleString()}</td>
      <td>${sTag(i.status)}</td><td>${cd}</td><td>${i.created_at.split(' ')[0]}</td>
      <td>
        <button class="btn btn-xs btn-ghost" onclick="showDetail(${i.id})">详情</button>
        ${i.status!=='已结束'?`<button class="btn btn-xs btn-ghost" onclick="window.location.href='委托单新建.html?edit=${i.id}'">编辑</button>`:''}
        ${i.status==='审批通过'?`<button class="btn btn-xs btn-primary" onclick="createContract(${i.id})">生成合同</button>`:''}
        ${i.status==='草稿'?`<button class="btn btn-xs btn-danger" onclick="endIntention(${i.id})">结束委托单</button>`:''}
        ${i.status==='已结束'&&i.contract_no?`<button class="btn btn-xs btn-ghost" onclick="goToContract('${i.contract_no}')">查看合同</button>`:''}
      </td></tr>`;
  }).join('');
  document.getElementById('totalCount').textContent = mockIntentions.length;
}

function filterTable() {
  const no = document.getElementById('searchNo').value.toLowerCase();
  const cust = document.getElementById('searchCustomer').value.toLowerCase();
  const st = document.getElementById('searchStatus').value;
  const dt = document.getElementById('searchDate').value;
  document.querySelectorAll('#tableBody tr').forEach(row => {
    row.style.display = (!no||row.dataset.no.toLowerCase().includes(no)) && (!cust||row.dataset.customer.toLowerCase().includes(cust)) && (!st||row.dataset.status===st) && (!dt||row.dataset.date===dt) ? '' : 'none';
  });
}
function resetSearch() { ['searchNo','searchCustomer','searchStatus','searchDate'].forEach(id=>document.getElementById(id).value=''); filterTable(); }

function showDetail(id) {
  currentDetail = mockIntentions.find(x=>x.id===id);
  if (!currentDetail) return;
  document.getElementById('listView').style.display='none'; document.getElementById('detailView').style.display='';
  document.getElementById('detailBreadcrumb').textContent = currentDetail.intention_no;
  const c = getCustomer(currentDetail.customer_id);
  document.getElementById('detailTitle').textContent = (c?c.company_name:'')+' - '+currentDetail.intention_no;
  renderDetail();
  const isCvt = currentDetail.status==='已结束';
  document.getElementById('btnEditDetail').style.display = isCvt?'none':'';
  document.getElementById('btnCreateContract').style.display = currentDetail.status==='审批通过'?'':'none';
}
function renderDetail() {
  const i = currentDetail; if (!i) return;
  const c = getCustomer(i.customer_id);
  const cd = i.contract_no ? `<a href="javascript:void(0)" onclick="goToContract('${i.contract_no}')" style="color:#1890ff;">${i.contract_no}</a>` : '<span style="color:#ccc;">-</span>';

  // ====== 一、委托单信息 ======
  document.getElementById('detailInfoGrid').innerHTML =
    '<div class="info-item"><span class="label">委托编号：</span><span class="value" style="color:#1890ff;font-weight:600;">'+i.intention_no+'</span></div>'+

    '<div class="info-item"><span class="label">报告类型：</span><span class="value">'+i.report_type+' / '+i.report_copies+'份</span></div>'+
    '<div class="info-item"><span class="label">是否退样：</span><span class="value">'+(i.need_return_sample?'是':'否')+'</span></div>'+
    '<div class="info-item"><span class="label">报告出具方式：</span><span class="value">'+i.report_delivery+'</span></div>'+
    '<div class="info-item"><span class="label">邮寄地址：</span><span class="value">'+(i.mail_address||'<span style="color:#ccc;">-</span>')+'</span></div>'+
    '<div class="info-item"><span class="label">见证方：</span><span class="value">'+(i.witness||'<span style="color:#ccc;">-</span>')+'</span></div>'+
    '<div class="info-item"><span class="label">关联合同：</span><span class="value">'+cd+'</span></div>'+
    '<div class="info-item"><span class="label">创建时间：</span><span class="value">'+i.created_at+'</span></div>';

  // ====== 二、检测项目（按样品分组，参考合同详情样式） ======
  var sampleMap = {};
  i.items.forEach(function(it) {
    var key = it.sample_name||'__unnamed';
    if (!sampleMap[key]) sampleMap[key] = { sample_name:it.sample_name, sample_qty:it.sample_qty||1, items:[] };
    sampleMap[key].items.push(it);
  });
  var tablesHtml = '';
  Object.keys(sampleMap).forEach(function(k, si) {
    var sg = sampleMap[k];
    var rows = sg.items.map(function(it, ii) {
      var cmaBadge = it.need_cma ? '<span class="tag tag-green">CMA</span>' : '';
      var cnasBadge = it.need_cnas ? '<span class="tag tag-blue">CNAS</span>' : '';
      var warnTag = it.qual_warn ? ' <span class="qual-warn-tag" data-tip="'+(it.qual_warn_msg||'')+'">⚠</span>' : '';
      var rowClass = it.qual_warn ? ' class="qual-warn-cell"' : '';
      return '<tr'+rowClass+'>'+
        '<td style="text-align:center;">'+(ii+1)+'</td>'+
        '<td>'+it.test_item_name+warnTag+'</td>'+
        '<td style="font-size:12px;">'+it.test_standard+'</td>'+
        '<td style="font-size:12px;">'+it.test_method+'</td>'+
        '<td style="font-size:12px;">'+(it.limit_value||'-')+'</td>'+
        '<td>'+(cmaBadge+cnasBadge||'<span style="color:#999;">-</span>')+'</td>'+
        '<td><span class="verdict-tag '+it.resultClass+'">'+it.resultText+'</span></td>'+
        '<td style="text-align:right;">&yen;'+(it.unit_price||0).toLocaleString()+'</td>'+
        '</tr>';

      '</div>'+
      '<table class="item-sub-table">'+
        '<thead><tr><th style="width:5%;">#</th><th style="width:18%;">检测项目</th><th style="width:18%;">检测标准</th><th style="width:14%;">检验方法</th><th style="width:14%;">限制范围</th><th style="width:10%;">资质类型</th><th style="width:12%;">校验结果</th><th style="width:9%;">单价</th></tr></thead>'+
        '<tbody>'+rows+'</tbody>'+
      '</table>'+
    '</div>';
  });
  document.getElementById('sampleTablesContainer').innerHTML = tablesHtml||'<div style="text-align:center;padding:20px;color:#ccc;">暂无检测项目</div>';
  document.getElementById('detailTotalPrice').textContent = '¥'+i.total_price.toLocaleString();
  document.getElementById('detailFinalPrice').textContent = '¥'+i.final_price.toLocaleString();

  // ====== 三、受检单位 & 样品 ======
  var unitMap = {};
  i.samples.forEach(function(s) {
    var key = s.inspected_unit_name||'';
    if (!unitMap[key]) unitMap[key] = { inspected_unit_name:s.inspected_unit_name, inspected_unit_tax_no:s.inspected_unit_tax_no, inspected_unit_contact:s.inspected_unit_contact, inspected_unit_phone:s.inspected_unit_phone, samples:[] };

  });
  var unitHtml = '';
  var ui = 0;
  Object.keys(unitMap).forEach(function(k) { ui++;
    var u = unitMap[k];
    unitHtml += '<div class="unit-box"><div class="unit-box-header">受检单位 '+ui+'：'+u.inspected_unit_name+

    u.samples.forEach(function(s) {
      unitHtml += '<tr><td>'+s.sample_name+'</td><td>'+(s.trademark||'-')+'</td><td>'+(s.spec_model||'-')+'</td><td>'+(s.production_date||'-')+'</td><td>'+(s.producer||'-')+'</td><td>'+(s.sender||'-')+'</td><td>'+(s.sample_status||'<span style="color:#ccc;">待实验室填写</span>')+'</td><td>'+(s.sample_grade||'<span style="color:#ccc;">待实验室填写</span>')+'</td><td>'+s.sample_qty+'</td></tr>';
    });
    unitHtml += '</tbody></table></div>';
  });
  document.getElementById('detailSamplesContent').innerHTML = unitHtml||'<div style="text-align:center;padding:20px;color:#ccc;">暂无受检单位 & 样品</div>';

  // ====== 四、优惠价格审批记录（来源：流程引擎审批节点记录） ======
  document.getElementById('detailApprovalTable').innerHTML = i.approval_records.length===0?'<tr><td colspan="5" style="text-align:center;color:#ccc;padding:20px;">暂无审批记录（委托单尚未提交审批）</td></tr>' :
    i.approval_records.map(function(r){return '<tr><td>'+r.node_name+'</td><td>'+vTag(r.result)+'</td><td style="max-width:300px;">'+(r.opinion||'-')+'</td><td>'+(r.approver||'-')+'</td><td>'+(r.approval_time||'<span style="color:#ccc;">待处理</span>')+'</td></tr>';}).join('');
}

function backToList() { document.getElementById('detailView').style.display='none'; document.getElementById('listView').style.display=''; currentDetail=null; }

function editFromDetail() { if(currentDetail) window.location.href = '委托单新建.html?edit=' + currentDetail.id; }
function createContractFromDetail() { if(currentDetail)createContract(currentDetail.id); }

function createContract(id) {
  const i = mockIntentions.find(x=>x.id===id);
  if(!i||i.status!=='审批通过'){alert('仅审批通过的委托单可生成合同');return;}
  var conId = 'CON'+new Date().toISOString().slice(0,10).replace(/-/g,'')+String(Math.floor(Math.random()*900+100));
  i.contract_no = conId; i.status = '已结束';
  alert('合同 '+conId+' 已生成，即将跳转合同管理。');
  renderList();
  window.location.href = '合同管理.html';
}
function goToContract(no) { window.location.href = '合同管理.html'; }

function endIntention(id) {
  const i = mockIntentions.find(x=>x.id===id);
  if(!i||i.status!=='草稿'){alert('仅草稿状态的委托单可结束');return;}
  if(!confirm('确认结束并废止该委托单？\n编号：'+i.intention_no+'\n结束后不可恢复。')) return;
  i.status = '已结束';
  alert('委托单 '+i.intention_no+' 已废止。');
  renderList();
  if(currentDetail&&currentDetail.id===i.id){currentDetail=i;renderDetail();}
}

// ============ EXPORT ============
function exportIntentionList() {
  var now = new Date().toISOString().slice(0,10);
  var header = '\uFEFF委托编号,委托单位,联系人,检验类别,报告类型,折扣前总价,优惠后总价,委托单状态,创建日期';
  var rows = [];
  document.querySelectorAll('#tableBody tr:not([style*="display: none"])').forEach(function(row) {
    var cells = row.querySelectorAll('td');
    rows.push([
      (cells[0].textContent||'').trim(),
      (cells[1].textContent||'').trim(),
      (cells[2].textContent||'').trim(),
      (cells[3].textContent||'').trim(),
      (cells[4].textContent||'').trim(),
      (cells[5].textContent||'').trim(),
      (cells[6].textContent||'').trim(),
      (cells[7].textContent||'').trim().replace(/\n/g,' '),
      (cells[8].textContent||'').trim()
    ].map(function(v) { var s=String(v); return /[,\n"]/.test(s) ? '"'+s.replace(/"/g,'""')+'"' : s; }).join(','));
  });
  var csv = header + '\n' + rows.join('\n');
  var blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = '委托单列表_' + now + '.csv'; a.click();
  URL.revokeObjectURL(url);
}
