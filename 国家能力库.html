<!DOCTYPE html>
<html lang="zh-CN">
<head>

<title>国家能力库 - LIMS 商务阶段</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  .sidebar { width: 220px; background: #001529; color: #fff; flex-shrink: 0; }

  .sidebar .logo span { color: #1890ff; }
  .sidebar .menu-group { padding: 8px 0; }
  .sidebar .menu-group-title { padding: 12px 24px 4px; font-size: 12px; color: rgba(255,255,255,.45); text-transform: uppercase; }
  .sidebar .menu-item { padding: 10px 24px; cursor: pointer; font-size: 14px; transition: all .2s; display: flex; align-items: center; gap: 10px; color: rgba(255,255,255,.65); text-decoration: none; }
  .sidebar .menu-item:hover { background: rgba(255,255,255,.08); color: #fff; }
  .sidebar .menu-item.active { background: #1890ff; font-weight: 600; color: #fff; }
  .sidebar .menu-item .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,.5); }
  .sidebar .menu-item.active .dot { background: #fff; }
  .sidebar .menu-badge { margin-left: auto; background: #ff4d4f; color: #fff; font-size: 11px; padding: 1px 6px; border-radius: 10px; }

  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .topbar { height: 48px; background: #fff; border-bottom: 1px solid #e8e8e8; display: flex; align-items: center; padding: 0 24px; justify-content: space-between; font-size: 13px; color: #666; }
  .content { flex: 1; padding: 24px; overflow-y: auto; }
  .breadcrumb { font-size: 13px; color: #999; margin-bottom: 16px; }
  .breadcrumb a { color: #1890ff; text-decoration: none; }
  .breadcrumb span { color: #333; }
  .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .page-header h2 { font-size: 20px; font-weight: 600; }
  .card { background: #fff; border-radius: 4px; box-shadow: 0 1px 3px rgba(0,0,0,.08); margin-bottom: 20px; }

  .search-bar { padding: 16px 20px; border-bottom: 1px solid #f0f0f0; display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
  .search-bar .field { display: flex; flex-direction: column; gap: 4px; }
  .search-bar label { font-size: 12px; color: #888; }
  .search-bar input, .search-bar select { height: 32px; padding: 0 10px; border: 1px solid #d9d9d9; border-radius: 4px; font-size: 13px; outline: none; width: 200px; transition: border .2s; }
  .search-bar input:focus, .search-bar select:focus { border-color: #1890ff; box-shadow: 0 0 0 2px rgba(24,144,255,.15); }

  .btn { height: 32px; padding: 0 16px; border-radius: 4px; font-size: 13px; cursor: pointer; border: 1px solid #d9d9d9; background: #fff; color: #333; display: inline-flex; align-items: center; gap: 6px; transition: all .2s; white-space: nowrap; }
  .btn:hover { border-color: #1890ff; color: #1890ff; }
  .btn-primary { background: #1890ff; border-color: #1890ff; color: #fff; }
  .btn-primary:hover { background: #40a9ff; border-color: #40a9ff; color: #fff; }
  .btn-sm { height: 26px; padding: 0 10px; font-size: 12px; }
  .btn-xs { height: 22px; padding: 0 6px; font-size: 11px; }

  .table-wrap { padding: 0 20px 20px; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { text-align: left; padding: 10px 8px; background: #fafafa; color: #666; font-weight: 500; border-bottom: 2px solid #f0f0f0; white-space: nowrap; }
  tbody td { padding: 8px; border-bottom: 1px solid #f0f0f0; }
  tbody tr:hover { background: #fafafa; }
  .tag { display: inline-block; padding: 2px 8px; border-radius: 2px; font-size: 12px; }
  .tag-green { background: #f6ffed; color: #52c41a; border: 1px solid #b7eb8f; }
  .tag-orange { background: #fff7e6; color: #fa8c16; border: 1px solid #ffd591; }
  .tag-default { background: #f5f5f5; color: #999; border: 1px solid #e8e8e8; }
  .footer { display: flex; justify-content: space-between; padding: 12px 20px; border-top: 1px solid #f0f0f0; font-size: 13px; color: #666; align-items: center; }

  .two-col { display: flex; gap: 0; }
  .tree-panel { width: 240px; flex-shrink: 0; border-right: 1px solid #f0f0f0; padding: 16px 0; overflow-y: auto; min-height: 500px; }
  .tree-panel .tree-title { font-size: 12px; color: #999; padding: 0 16px 8px; }
  .tree-node { padding: 6px 16px 6px 16px; cursor: pointer; font-size: 13px; transition: background .15s; display: flex; align-items: center; gap: 6px; }
  .tree-node:hover { background: #f5f7fa; }

  .detail-panel { flex: 1; padding: 20px; overflow-y: auto; }

  .detail-panel .panel-header h4 { font-size: 15px; font-weight: 600; }

  .note-tooltip { display: inline-block; max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: default; font-size: 11px; color: #999; }
</style>

    {name:'电子数据司法鉴定通用规范',code:'SF/T 0098-2021',remark:''},
  ],

// Flatten all items with domain attribution
const allItems = [];
Object.keys(nationalCapLib).forEach(function(domain) {
  nationalCapLib[domain].forEach(function(it) {
    allItems.push({
      domain: domain,
      name: it.name,
      code: it.code,
      remark: it.remark||''
    });
  });
});

// ============ State ============
let selectedDomain = null;

// ============ Init ============
function init() {
  renderTree();
  renderItems();
}
init();

function renderTree() {
  var container = document.getElementById('domainTree');
  var html = '<div class="tree-node '+(!selectedDomain?'active':'')+'" onclick="selectDomain(null)"><span style="font-size:10px;">📋</span>全部领域<span class="count">'+allItems.length+'</span></div>';
  Object.keys(nationalCapLib).forEach(function(domain) {
    var count = nationalCapLib[domain].length;
    html += '<div class="tree-node '+(selectedDomain===domain?'active':'')+'" onclick="selectDomain(&quot;'+escAttr(domain)+'&quot;)"><span style="font-size:10px;color:#999;">•</span>'+escHtml(domain)+'<span class="count">'+count+'</span></div>';
  });
  container.innerHTML = html;
}

function selectDomain(domain) {
  selectedDomain = domain;
  renderTree();
  renderItems();
}

function getDisplayItems() {
  var items = allItems;
  if (selectedDomain) {
    items = items.filter(function(it) { return it.domain === selectedDomain; });
  }
  var sn = (document.getElementById('searchName')&&document.getElementById('searchName').value||'').trim().toLowerCase();
  var ss = (document.getElementById('searchStd')&&document.getElementById('searchStd').value||'').trim().toLowerCase();
  if (sn) items = items.filter(function(it) { return it.name.toLowerCase().indexOf(sn) >= 0; });
  if (ss) items = items.filter(function(it) { return it.code.toLowerCase().indexOf(ss) >= 0; });
  return items;
}

function filterItems() { renderItems(); }
function resetFilter() { document.getElementById('searchName').value = ''; document.getElementById('searchStd').value = ''; renderItems(); }

function renderItems() {
  var items = getDisplayItems();
  var title = selectedDomain ? selectedDomain + ' — 标准清单' : '全部标准';
  document.getElementById('panelTitle').textContent = title;
  document.getElementById('domainSummary').style.display = selectedDomain ? 'flex' : 'none';
  document.getElementById('domainItemCount').textContent = items.length;
  document.getElementById('footerTotal').textContent = items.length;

  var html = '';
  if (items.length === 0) {
    html = '<tr><td colspan="5" style="text-align:center;padding:32px;color:#ccc;">暂无匹配的标准记录</td></tr>';
  } else {
    items.forEach(function(it, idx) {
      var isExpired = it.remark.indexOf('废止') >= 0;
      var statusTag = isExpired ? '<span class="tag tag-orange">已废止</span>' : '<span class="tag tag-green">有效</span>';
      var remarkHtml = it.remark ? '<span class="note-tooltip" title="'+escAttr(it.remark)+'">'+escHtml(it.remark)+'</span>' : '<span style="color:#ccc;">—</span>';
      html += '<tr>'+
        '<td style="text-align:center;">'+(idx+1)+'</td>'+
        '<td>'+escHtml(it.name)+'</td>'+
        '<td style="font-family:monospace;font-size:12px;color:#1890ff;">'+escHtml(it.code)+'</td>'+
        '<td style="font-size:11px;">'+remarkHtml+'</td>'+
        '<td>'+statusTag+'</td>'+
        '</tr>';
    });
  }
  document.getElementById('itemTableBody').innerHTML = html;
}

function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s) { return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
