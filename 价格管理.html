<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>价格管理 - LIMS 商务阶段</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; background: #f0f2f5; color: #333; }
  .app { display: flex; min-height: 100vh; }

  .sidebar { width: 220px; background: #001529; color: #fff; flex-shrink: 0; }
  .sidebar .logo { padding: 20px; font-size: 18px; font-weight: 700; border-bottom: 1px solid rgba(255,255,255,.1); letter-spacing: 1px; }
  .sidebar .logo span { color: #1890ff; }
  .sidebar .menu-group { padding: 8px 0; }
  .sidebar .menu-group-title { padding: 12px 24px 4px; font-size: 12px; color: rgba(255,255,255,.45); text-transform: uppercase; }
  .sidebar .menu-item { padding: 10px 24px; cursor: pointer; font-size: 14px; transition: all .2s; display: flex; align-items: center; gap: 10px; color: rgba(255,255,255,.65); text-decoration: none; }
  .sidebar .menu-item:hover { background: rgba(255,255,255,.08); color: #fff; }
  .sidebar .menu-item.active { background: #1890ff; font-weight: 600; color: #fff; }
  .sidebar .menu-item .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,.5); }
  .sidebar .menu-item.active .dot { background: #fff; }
  .sidebar .menu-badge { margin-left: auto; background: #ff4d4f; color: #fff; font-size: 11px; padding: 1px 6px; border-radius: 10px; }

  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .topbar { height: 48px; background: #fff; border-bottom: 1px solid #e8e8e8; display: flex; align-items: center; padding: 0 24px; justify-content: space-between; font-size: 13px; color: #666; }
  .content { flex: 1; padding: 24px; overflow-y: auto; }
  .breadcrumb { font-size: 13px; color: #999; margin-bottom: 16px; }
  .breadcrumb a { color: #1890ff; text-decoration: none; }
  .breadcrumb span { color: #333; }
  .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .page-header h2 { font-size: 20px; font-weight: 600; }
  .card { background: #fff; border-radius: 4px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }

  /* Page Tabs */
  .page-tabs { display: flex; border-bottom: 2px solid #f0f0f0; background: #fff; border-radius: 4px 4px 0 0; padding: 0 20px; margin-bottom: -1px; }
  .page-tab { padding: 12px 24px; font-size: 14px; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; color: #666; transition: all .2s; position: relative; z-index: 1; }
  .page-tab:hover { color: #1890ff; }
  .page-tab.active { color: #1890ff; border-bottom-color: #1890ff; font-weight: 600; }

  .search-bar { padding: 16px 20px; border-bottom: 1px solid #f0f0f0; display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
  .search-bar .field { display: flex; flex-direction: column; gap: 4px; }
  .search-bar label { font-size: 12px; color: #888; }
  .search-bar input, .search-bar select { height: 32px; padding: 0 10px; border: 1px solid #d9d9d9; border-radius: 4px; font-size: 13px; outline: none; width: 180px; transition: border .2s; }
  .search-bar input:focus, .search-bar select:focus { border-color: #1890ff; box-shadow: 0 0 0 2px rgba(24,144,255,.15); }

  .btn { height: 32px; padding: 0 16px; border-radius: 4px; font-size: 13px; cursor: pointer; border: 1px solid #d9d9d9; background: #fff; color: #333; display: inline-flex; align-items: center; gap: 6px; transition: all .2s; white-space: nowrap; }
  .btn:hover { border-color: #1890ff; color: #1890ff; }
  .btn:active { opacity: 0.85; transform: translateY(1px); }
  .btn-primary { background: #1890ff; border-color: #1890ff; color: #fff; }
  .btn-primary:hover { background: #40a9ff; border-color: #40a9ff; color: #fff; }
  .btn-danger { color: #ff4d4f; }
  .btn-danger:hover { border-color: #ff4d4f; color: #ff4d4f; }
  .btn-warning { color: #fa8c16; border-color: #fa8c16; }
  .btn-warning:hover { border-color: #fa8c16; color: #fa8c16; background: #fff7e6; }
  .btn-sm { height: 26px; padding: 0 10px; font-size: 12px; }
  .btn-ghost { border: none; background: transparent; color: #1890ff; padding: 0 8px; }
  .btn-ghost:hover { background: rgba(24,144,255,.06); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .table-wrap { padding: 0 20px 20px; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { text-align: left; padding: 10px 8px; background: #fafafa; color: #666; font-weight: 500; border-bottom: 2px solid #f0f0f0; white-space: nowrap; }
  tbody td { padding: 8px; border-bottom: 1px solid #f0f0f0; }
  tbody tr:hover { background: #fafafa; }
  tbody tr.row-selected { background: #e6f7ff; }
  tbody tr.row-selected:hover { background: #bae7ff; }

  .tag { display: inline-block; padding: 2px 8px; border-radius: 2px; font-size: 12px; }
  .tag-green { background: #f6ffed; color: #52c41a; border: 1px solid #b7eb8f; }
  .tag-default { background: #f5f5f5; color: #999; border: 1px solid #e8e8e8; }
  .tag-purple { background: #f9f0ff; color: #722ed1; border: 1px solid #d3adf7; }
  .tag-blue { background: #e6f7ff; color: #1890ff; border: 1px solid #91d5ff; }

  .footer { display: flex; justify-content: space-between; padding: 12px 20px; border-top: 1px solid #f0f0f0; font-size: 13px; color: #666; align-items: center; }
  .footer-right { display: flex; gap: 12px; align-items: center; }

  .price-tag { font-weight: 600; color: #cf1322; }
  .package-price { font-weight: 600; color: #722ed1; }

  /* Batch action bar */
  .batch-bar { display: none; padding: 8px 20px; background: #e6f7ff; border-bottom: 1px solid #91d5ff; align-items: center; gap: 12px; font-size: 13px; }
  .batch-bar.show { display: flex; }

  /* Tree check dropdown — trigger matches search-bar select; dropdown list matches fPkgItems checkbox style */
  .tree-check-container { position: relative; display: inline-block; }
  .tree-check-trigger { height: 32px; width: 180px; padding: 0 28px 0 10px; border: 1px solid #d9d9d9; border-radius: 4px; font-size: 13px; cursor: pointer; background: #fff; color: #333; display: flex; align-items: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: border .2s; position: relative; }
  .tree-check-trigger:hover { border-color: #1890ff; }
  .tree-check-trigger:focus { border-color: #1890ff; box-shadow: 0 0 0 2px rgba(24,144,255,.15); outline: none; }
  .tree-check-trigger::after { content: ''; position: absolute; right: 10px; top: 50%; margin-top: -2px; border: 4px solid transparent; border-top-color: #999; }
  .tree-check-dropdown { position: absolute; top: 100%; left: 0; margin-top: 4px; background: #fff; border: 1px solid #e8e8e8; border-radius: 6px; box-shadow: 0 6px 16px rgba(0,0,0,.08), 0 3px 6px rgba(0,0,0,.04); z-index: 100; min-width: 260px; display: none; }
  .tree-check-dropdown.show { display: block; }
  .tree-check-dropdown .tree-search { padding: 8px 10px; border-bottom: 1px solid #f0f0f0; }
  .tree-check-dropdown .tree-search input { width: 100%; height: 32px; padding: 0 8px; border: 1px solid #d9d9d9; border-radius: 4px; font-size: 13px; outline: none; box-sizing: border-box; }
  .tree-check-dropdown .tree-search input:focus { border-color: #1890ff; box-shadow: 0 0 0 2px rgba(24,144,255,.15); }
  .tree-check-dropdown .tree-scroll { max-height: 260px; overflow-y: auto; padding: 4px 0; }
  .tree-dropdown-label { display: flex; align-items: center; gap: 6px; padding: 5px 12px; cursor: pointer; font-size: 13px; transition: background .15s; user-select: none; }
  .tree-dropdown-label:hover { background: #f5f7fa; }
  .tree-dropdown-label.hidden { display: none; }
  .tree-dropdown-label .expand-icon { width: 14px; height: 14px; font-size: 10px; color: #bbb; flex-shrink: 0; display: inline-flex; align-items: center; justify-content: center; transition: transform .2s; }
  .tree-dropdown-label .expand-icon.expanded { transform: rotate(90deg); }
  .tree-dropdown-label .expand-placeholder { width: 14px; flex-shrink: 0; }
  .tree-dropdown-label.indent1 { padding-left: 26px; }
  .tree-dropdown-label.indent2 { padding-left: 42px; }
  .tree-dropdown-label input[type="checkbox"] { width: 14px; height: 14px; margin: 0; accent-color: #1890ff; cursor: pointer; flex-shrink: 0; }
  .tree-dropdown-children { display: none; }
  .tree-dropdown-children.show { display: block; }

  /* Expandable sub-table for package items */
  .expander-btn { cursor: pointer; color: #1890ff; font-size: 12px; }
  .sub-row { display: none; }
  .sub-row.show { display: table-row; }
  .sub-row td:first-child { padding-left: 48px; }
  .sub-row td { background: #fafbfc; font-size: 12px; }

  .drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 1000; opacity: 0; visibility: hidden; transition: opacity .3s, visibility .3s; }
  .drawer-overlay.show { opacity: 1; visibility: visible; }
  .drawer { position: fixed; top: 0; right: 0; bottom: 0; width: 640px; background: #fff; box-shadow: -6px 0 20px rgba(0,0,0,.12); z-index: 1001; display: flex; flex-direction: column; transform: translateX(100%); transition: transform .3s cubic-bezier(.25,.8,.25,1); }
  .drawer-overlay.show .drawer { transform: translateX(0); }
  .drawer-header { padding: 16px 24px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
  .drawer-header h3 { font-size: 16px; font-weight: 600; }
  .drawer-close { width: 28px; height: 28px; border: none; background: transparent; font-size: 18px; cursor: pointer; color: #999; border-radius: 4px; display: flex; align-items: center; justify-content: center; }
  .drawer-close:hover { background: #f5f5f5; color: #333; }
  .drawer-body { flex: 1; padding: 24px; overflow-y: auto; }
  .drawer-footer { padding: 12px 24px; border-top: 1px solid #f0f0f0; display: flex; justify-content: flex-end; gap: 8px; flex-shrink: 0; }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 13px; color: #333; margin-bottom: 4px; font-weight: 500; }
  .form-group label .required { color: #ff4d4f; }
  .form-group input, .form-group select, .form-group textarea { width: 100%; height: 34px; padding: 0 10px; border: 1px solid #d9d9d9; border-radius: 4px; font-size: 13px; outline: none; }
  .form-group input[type="checkbox"] { width: auto; height: auto; padding: 0; border: none; margin: 0; }
  .form-group textarea { height: 80px; padding: 8px 10px; resize: vertical; }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #1890ff; box-shadow: 0 0 0 2px rgba(24,144,255,.15); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .selected-items-list { max-height: 150px; overflow-y: auto; border: 1px solid #f0f0f0; border-radius: 4px; padding: 8px; background: #fafafa; margin-top: 4px; font-size: 12px; }
  .selected-items-list div { padding: 2px 0; }

  .hint { font-size: 12px; color: #999; margin-top: 2px; }

  /* 打包浮层 - 项目选择器 */
  .pkg-item-selector { border: 1px solid #d9d9d9; border-radius: 4px; overflow: hidden; }

  /* 已选区 */
  .pkg-selected-zone { background: #e6f7ff; border-bottom: 2px solid #91d5ff; }
  .pkg-selected-zone .zone-label { padding: 6px 10px 2px; font-size: 11px; color: #1890ff; font-weight: 600; display: flex; justify-content: space-between; align-items: center; }
  .pkg-selected-list { padding: 0 4px 4px; max-height: 180px; overflow-y: auto; }
  .pkg-selected-list .empty-hint { padding: 6px 10px; color: #91a7c4; font-size: 13px; }
  .pkg-selected-row { display: flex; align-items: center; padding: 4px 8px; margin: 2px 4px; background: #fff; border-radius: 4px; border: 1px solid #d6e4ff; font-size: 13px; gap: 8px; }
  .pkg-selected-row .sel-info { flex: 1; min-width: 0; }
  .pkg-selected-row .sel-name { font-weight: 500; color: #333; }
  .pkg-selected-row .sel-meta { font-size: 11px; color: #999; margin-left: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pkg-selected-row .sel-price { color: #cf1322; font-weight: 500; white-space: nowrap; font-size: 13px; }
  .pkg-selected-row .sel-remove { flex-shrink: 0; width: 20px; height: 20px; border-radius: 50%; border: none; background: #ffccc7; color: #ff4d4f; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1; }
  .pkg-selected-row .sel-remove:hover { background: #ff4d4f; color: #fff; }

  /* 搜索区 */
  .pkg-search-zone { background: #fff; }
  .pkg-search-zone .zone-label { padding: 6px 10px 2px; font-size: 11px; color: #999; font-weight: 600; }
  .pkg-search-wrap { padding: 6px 10px; }
  .pkg-search-wrap input { width: 100%; height: 30px; padding: 0 8px; border: 1px solid #d9d9d9; border-radius: 4px; font-size: 13px; outline: none; }
  .pkg-search-wrap input:focus { border-color: #1890ff; box-shadow: 0 0 0 2px rgba(24,144,255,.15); }
  .pkg-item-scroll { max-height: 240px; overflow-y: auto; }
  .pkg-item-group { padding: 2px 0; }
  .pkg-item-group-title { padding: 8px 10px 4px; font-size: 12px; color: #999; font-weight: 500; }
  .pkg-item-row { display: flex; align-items: center; padding: 5px 10px 5px 20px; font-size: 13px; cursor: pointer; transition: background .15s; gap: 8px; }
  .pkg-item-row:hover { background: #f5f7fa; }
  .pkg-item-row.selected { background: #e6f7ff; }
  .pkg-item-row input[type="checkbox"] { width: 14px; height: 14px; margin: 0; accent-color: #1890ff; cursor: pointer; flex-shrink: 0; }
  .pkg-item-row .item-detail { flex: 1; min-width: 0; }
  .pkg-item-row .item-detail-name { font-weight: 500; }
  .pkg-item-row .item-detail-meta { font-size: 11px; color: #999; }
  .pkg-item-row .item-price-tag { font-size: 13px; color: #cf1322; white-space: nowrap; font-weight: 500; }
  .pkg-no-result { padding: 20px; text-align: center; color: #ccc; font-size: 13px; }
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="logo">LIMS<span>系统</span></div>
    <div class="menu-group">
      <div class="menu-group-title">商务阶段</div>
      <a href="客户管理.html" class="menu-item"><span class="dot"></span>客户管理</a>
      <a href="委托单管理.html" class="menu-item"><span class="dot"></span>委托单管理</a>
      <a href="合同管理.html" class="menu-item"><span class="dot"></span>合同管理</a>
    </div>
    <div class="menu-group">
      <div class="menu-group-title">基础业务信息管理</div>
      <a href="合同模板管理.html" class="menu-item"><span class="dot"></span>合同模板管理</a>
      <div class="menu-item active"><span class="dot"></span>价格管理</div>
      <a href="CMA资质项管理.html" class="menu-item"><span class="dot"></span>CMA资质项管理</a>
      <a href="CNAS资质项管理.html" class="menu-item"><span class="dot"></span>CNAS资质项管理</a>
      <a href="国家能力库.html" class="menu-item"><span class="dot"></span>国家能力库</a>
    </div>
    <div class="menu-group">
      <div class="menu-group-title">流程引擎</div>
      <a href="流程引擎-待办列表.html" class="menu-item"><span class="dot"></span>待办任务<span class="menu-badge">8</span></a>
      <a href="流程引擎-已办列表.html" class="menu-item"><span class="dot"></span>已办任务</a>
    </div>
  </div>

  <div class="main">
    <div class="topbar"><span>商务阶段</span><span>内勤部 · 李婷</span></div>
    <div class="content">
      <div class="breadcrumb"><a href="#">首页</a> &gt; <span>价格管理</span></div>
      <div class="page-header">
        <h2>价格管理</h2>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-primary" id="btnAdd" onclick="showItemModal('add')">+ 新增报价</button>
          <button class="btn" onclick="exportPriceData()">导出</button>
          <button class="btn" onclick="alert('导入Excel功能')">导入Excel</button>
        </div>
      </div>

      <!-- Page Tabs -->
      <div class="page-tabs" id="pageTabs">
        <div class="page-tab active" onclick="switchPageTab('single',this)">单项价格</div>
        <div class="page-tab" onclick="switchPageTab('package',this)">打包项价格</div>
      </div>

      <div class="card">
        <!-- ====== 单项价格 Tab ====== -->
        <div id="tabSingle">
          <div class="search-bar">
            <div class="field"><label>检测项目</label><input type="text" placeholder="输入关键词搜索" id="sItemName" oninput="renderSingleTable()"></div>
            <div class="field"><label>业务类型</label>
              <div class="tree-check-container" id="singleBizTypeContainer">
                <div class="tree-check-trigger" id="singleBizTypeTrigger" onclick="toggleTreeDropdown('singleBizTypeDropdown')" tabindex="0">全部</div>
                <div class="tree-check-dropdown" id="singleBizTypeDropdown"></div>
              </div>
            </div>
            <div class="field"><label>检测标准</label><input type="text" placeholder="如：GB 5749-2022" id="sStandard" oninput="renderSingleTable()"></div>
            <div class="field"><label>报价类型</label><select id="sPriceType" onchange="renderSingleTable()"><option value="">全部</option><option>单价</option><option>全项</option><option>场次</option><option>每间</option><option>每系统</option></select></div>
            <div class="field"><label>启用状态</label><select id="sStatus" onchange="renderSingleTable()"><option value="">全部</option><option>启用</option><option>停用</option></select></div>
            <button class="btn btn-primary" onclick="renderSingleTable()">查询</button>
          </div>

          <div class="batch-bar" id="singleBatchBar">
            <span>已选 <strong id="singleSelectedCount">0</strong> 项</span>
            <button class="btn btn-primary btn-sm" onclick="generatePackage()">生成打包价</button>
            <button class="btn btn-sm" onclick="batchEnableSingle()">批量启用</button>
            <button class="btn btn-sm btn-danger" onclick="batchDeleteSingle()">批量删除</button>
          </div>

          <div class="table-wrap">
            <table>
              <thead><tr>
                <th style="width:36px;"><input type="checkbox" onclick="toggleSelectAllSingle(this)"></th>
                <th>检测项目</th>
                <th>业务类型分类路径</th>
                <th>检测标准</th>
                <th>检测方法</th>
                <th>报价类型</th>
                <th>单价(元)</th>
                <th>计价单位</th>
                <th>所属打包</th>
                <th>状态</th>
                <th style="width:120px;">操作</th>
              </tr></thead>
              <tbody id="singleTableBody"></tbody>
            </table>
          </div>
          <div class="footer">
            <span>共 <strong id="singleTotalCount">0</strong> 条</span>
            <div class="footer-right">
              <button class="btn btn-sm">上一页</button><button class="btn btn-sm btn-primary">1</button><button class="btn btn-sm">2</button><button class="btn btn-sm">3</button><button class="btn btn-sm">下一页</button>
            </div>
          </div>
        </div>

        <!-- ====== 打包项价格 Tab ====== -->
        <div id="tabPackage" style="display:none;">
          <div class="search-bar">
            <div class="field"><label>打包名称</label><input type="text" placeholder="输入关键词搜索" id="pPkgName" oninput="renderPackageTable()"></div>
            <div class="field"><label>业务类型</label>
              <div class="tree-check-container" id="pkgBizTypeContainer">
                <div class="tree-check-trigger" id="pkgBizTypeTrigger" onclick="toggleTreeDropdown('pkgBizTypeDropdown')" tabindex="0">全部</div>
                <div class="tree-check-dropdown" id="pkgBizTypeDropdown"></div>
              </div>
            </div>
            <div class="field"><label>启用状态</label><select id="pStatus" onchange="renderPackageTable()"><option value="">全部</option><option>启用</option><option>停用</option></select></div>
            <button class="btn btn-primary" onclick="renderPackageTable()">查询</button>
          </div>

          <div class="batch-bar" id="pkgBatchBar">
            <span>已选 <strong id="pkgSelectedCount">0</strong> 项</span>
            <button class="btn btn-sm" onclick="batchEnablePackage()">批量启用</button>
            <button class="btn btn-sm btn-danger" onclick="batchDeletePackage()">批量删除</button>
          </div>

          <div class="table-wrap">
            <table>
              <thead><tr>
                <th style="width:36px;"><input type="checkbox" onclick="toggleSelectAllPackage(this)"></th>
                <th style="width:30px;"></th>
                <th>打包名称</th>
                <th>业务类型分类路径</th>
                <th>打包价(元)</th>
                <th>计价单位</th>
                <th>所含项目数</th>
                <th>状态</th>
                <th style="width:120px;">操作</th>
              </tr></thead>
              <tbody id="packageTableBody"></tbody>
            </table>
          </div>
          <div class="footer">
            <span>共 <strong id="packageTotalCount">0</strong> 条</span>
            <div class="footer-right">
              <button class="btn btn-sm">上一页</button><button class="btn btn-sm btn-primary">1</button><button class="btn btn-sm">2</button><button class="btn btn-sm">3</button><button class="btn btn-sm">下一页</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ====== Drawer: 单项价格 新增/编辑 ====== -->
<div class="drawer-overlay" id="itemDrawer">
  <div class="drawer">
    <div class="drawer-header"><h3 id="itemDrawerTitle">新增报价</h3><button class="drawer-close" onclick="closeItemDrawer()">✕</button></div>
    <div class="drawer-body">
      <div class="form-row">

// ============ 选中状态 ============
let selectedSingleIds = new Set();
let selectedPackageIds = new Set();

// ============ 业务类型筛选 ============
let singleBizTypeFilter = new Set();
let pkgBizTypeFilter = new Set();

function renderBizTypeDropdown(dropdownId) {
  const dd = document.getElementById(dropdownId);
  const filterSet = dropdownId==='singleBizTypeDropdown' ? singleBizTypeFilter : pkgBizTypeFilter;
  const suffix = dropdownId.replace('Dropdown','');

  // Collect all leaf IDs for parent check state computation
  function getLeafIds(node) {
    if (!node.children || node.children.length===0) return [node.id];
    return node.children.flatMap(getLeafIds);
  }
  function isAllChecked(node) {
    return getLeafIds(node).every(id => filterSet.has(id));
  }
  function isPartChecked(node) {
    const leaves = getLeafIds(node);
    return !isAllChecked(node) && leaves.some(id => filterSet.has(id));
  }

  function renderNode(node, depth) {
    const hasChildren = node.children && node.children.length > 0;
    const checked = isAllChecked(node);
    const part = !checked && isPartChecked(node);
    const cbId = `tcb_${suffix}_${node.id}`;
    html += `<label class="tree-dropdown-label indent${depth}" data-name="${node.name.toLowerCase()}" data-id="${node.id}">
      ${hasChildren ? `<span class="expand-icon" onclick="event.stopPropagation();toggleTreeExpand('${node.id}','${dropdownId}')">▶</span>` : '<span class="expand-placeholder"></span>'}
      <input type="checkbox" id="${cbId}"${checked && !part?' checked':''} onchange="event.stopPropagation();toggleTreeCheck('${node.id}','${dropdownId}')">
      ${node.name}
    </label>`;
    if (hasChildren) {
      html += `<div class="tree-dropdown-children" id="tc_${dropdownId}_${node.id}">`;
      node.children.forEach(c => renderNode(c, depth+1));
      html += `</div>`;
    }
  }

  // Build search input + tree body
  let html = `<div class="tree-search"><input type="text" placeholder="输入关键词搜索..." oninput="filterBizTree('${dropdownId}',this.value)"></div>`;
  html += `<div class="tree-scroll" id="treeScroll_${dropdownId}">`;
  bizTypeTree.forEach(n => renderNode(n, 0));
  html += `</div>`;

  dd.innerHTML = html;

  // Restore expand state: default expand L1
  dd.querySelectorAll('.tree-dropdown-children').forEach(el => {
    const parts = el.id.split('_');
    // Expand L1 children by default
    const nodeId = parts[parts.length-1];
    const isL1 = bizTypeTree.some(n => n.id === nodeId);
    if (isL1) el.classList.add('show');
  });
  // Rotate L1 expand icons
  dd.querySelectorAll('.tree-dropdown-label.indent0 .expand-icon').forEach(icon => {
    icon.classList.add('expanded');
  });

  // Set indeterminate state on checkboxes (must do after DOM insertion)
  bizTypeTree.forEach(n => setIndeterminate(n, dd));
  function setIndeterminate(node, container) {
    const cb = container.querySelector(`#tcb_${suffix}_${node.id}`);
    if (cb && (node.children && node.children.length>0)) {
      const part = isPartChecked(node);
      cb.indeterminate = part;
      node.children.forEach(c => setIndeterminate(c, container));
    }
  }
}

function toggleTreeExpand(nodeId, dropdownId) {
  const dd = document.getElementById(dropdownId);
  const el = document.getElementById('tc_'+dropdownId+'_'+nodeId);
  if (el) el.classList.toggle('show');
  // Rotate icon
  const nodeDiv = dd.querySelector(`.tree-dropdown-label[data-id="${nodeId}"]`);
  if (nodeDiv) {
    const icon = nodeDiv.querySelector('.expand-icon');
    if (icon) icon.classList.toggle('expanded');
  }
}

function toggleTreeCheck(nodeId, dropdownId) {
  const filterSet = dropdownId==='singleBizTypeDropdown' ? singleBizTypeFilter : pkgBizTypeFilter;

  // Find all leaf IDs under this node
  function getLeafIds(node) {
    if (!node.children || node.children.length===0) return [node.id];
    return node.children.flatMap(getLeafIds);
  }
  function findNode(id, tree) {
    for (const n of tree) {
      if (n.id === id) return n;
      if (n.children) {
        const r = findNode(id, n.children);
        if (r) return r;
      }
    }
    return null;
  }

  const node = findNode(nodeId, bizTypeTree);
  if (!node) return;
  const leaves = getLeafIds(node);

  // If all leaves are checked → uncheck all; otherwise → check all
  const allChecked = leaves.every(id => filterSet.has(id));
  if (allChecked) {
    leaves.forEach(id => filterSet.delete(id));
  } else {
    leaves.forEach(id => filterSet.add(id));
  }

  renderBizTypeDropdown(dropdownId);
  updateBizTypeTrigger(dropdownId);
  if (dropdownId==='singleBizTypeDropdown') renderSingleTable(); else renderPackageTable();
}

function filterBizTree(dropdownId, keyword) {
  const dd = document.getElementById(dropdownId);
  const scroll = document.getElementById('treeScroll_'+dropdownId);
  if (!scroll) return;

  const kw = keyword.trim().toLowerCase();
  const allNodes = scroll.querySelectorAll('.tree-dropdown-label');
  const allChildren = scroll.querySelectorAll('.tree-dropdown-children');

  if (!kw) {
    // Reset: show all nodes, collapse all children except L1
    allNodes.forEach(n => n.classList.remove('hidden'));
    allChildren.forEach(el => el.classList.remove('show'));
    allChildren.forEach(el => {
      const parts = el.id.split('_');
      const nodeId = parts[parts.length-1];
      const isL1 = bizTypeTree.some(n => n.id === nodeId);
      if (isL1) el.classList.add('show');
    });
    dd.querySelectorAll('.expand-icon').forEach(icon => {
      const nodeDiv = icon.closest('.tree-dropdown-label');
      const isL1 = nodeDiv && nodeDiv.classList.contains('indent0');
      if (isL1) icon.classList.add('expanded');
      else icon.classList.remove('expanded');
    });
    return;
  }

  // Filter: show matching nodes and their ancestors/descendants
  allNodes.forEach(n => n.classList.remove('hidden'));
  allChildren.forEach(el => el.classList.remove('show'));

  // Find matching nodes
  const matched = new Set();
  allNodes.forEach(n => {
    const name = n.dataset.name || '';
    if (name.includes(kw)) matched.add(n.dataset.id);
  });

  if (matched.size === 0) {
    allNodes.forEach(n => n.classList.add('hidden'));
    allChildren.forEach(el => el.classList.add('hidden'));
    return;
  }

  // Show matched nodes + expand ancestors + show all children of matched
  allNodes.forEach(n => {
    const id = n.dataset.id;
    if (matched.has(id)) {
      n.classList.remove('hidden');
      // Expand parent chains
      let parent = n.parentElement;
      while (parent && parent !== scroll) {
        if (parent.classList.contains('tree-dropdown-children')) {
          parent.classList.add('show');
          // Also show the parent node's expand icon rotation
          const parentNodeId = parent.id.split('_').pop();
          const parentNode = dd.querySelector(`.tree-dropdown-label[data-id="${parentNodeId}"]`);
          if (parentNode) {
            parentNode.classList.remove('hidden');
            const icon = parentNode.querySelector('.expand-icon');
            if (icon) icon.classList.add('expanded');
          }
        }
        parent = parent.parentElement;
      }
      // Show children of matched node
      const childrenEl = document.getElementById('tc_'+dropdownId+'_'+id);
      if (childrenEl) {
        childrenEl.classList.add('show');
        const icon = n.querySelector('.expand-icon');
        if (icon) icon.classList.add('expanded');
        // Show all child nodes
        childrenEl.querySelectorAll('.tree-dropdown-label').forEach(cn => cn.classList.remove('hidden'));
      }
    } else {
      // Check if node is an ancestor of a matched node (already handled via expand)
      // Hide if not in expanded path
      let shouldShow = false;
      let p = n.nextElementSibling;
      if (p && p.classList.contains('tree-dropdown-children')) {
        const visibleChildren = p.querySelectorAll('.tree-dropdown-label:not(.hidden)');
        shouldShow = visibleChildren.length > 0;
      }
      if (!shouldShow) n.classList.add('hidden');
    }
  });
}

function updateBizTypeTrigger(dropdownId) {
  const filterSet = dropdownId==='singleBizTypeDropdown' ? singleBizTypeFilter : pkgBizTypeFilter;
  const triggerId = dropdownId==='singleBizTypeDropdown' ? 'singleBizTypeTrigger' : 'pkgBizTypeTrigger';
  if (filterSet.size === 0) {
    document.getElementById(triggerId).textContent = '全部';
  } else if (filterSet.size <= 3) {
    document.getElementById(triggerId).textContent = Array.from(filterSet).map(id => getBizTypePath(id)).join(', ');
  } else {
    document.getElementById(triggerId).textContent = '已选 ' + filterSet.size + ' 项';
  }
}

function toggleTreeDropdown(dropdownId) {
  const dd = document.getElementById(dropdownId);
  const isOpen = dd.classList.contains('show');
  // Close all others first
  document.querySelectorAll('.tree-check-dropdown').forEach(d => d.classList.remove('show'));
  if (!isOpen) {
    renderBizTypeDropdown(dropdownId);
    dd.classList.add('show');
    updateBizTypeTrigger(dropdownId);
  }
}

// Close dropdown on outside click
document.addEventListener('click', function(e) {
  if (!e.target.closest('.tree-check-container')) {
    document.querySelectorAll('.tree-check-dropdown').forEach(d => d.classList.remove('show'));

});

// ============ 单项价格表 ============
function renderSingleTable() {
  const keyword = (document.getElementById('sItemName').value || '').toLowerCase();
  const standard = (document.getElementById('sStandard').value || '').toLowerCase();
  const priceType = document.getElementById('sPriceType').value;
  const status = document.getElementById('sStatus').value;

  let rows = singleItems.filter(it => {
    if (keyword && !it.item_name.toLowerCase().includes(keyword)) return false;
    if (standard && !(it.test_standard||'').toLowerCase().includes(standard)) return false;
    if (priceType && it.price_type !== priceType) return false;
    if (status && it.status !== status) return false;
    if (singleBizTypeFilter.size > 0 && !singleBizTypeFilter.has(it.biz_type_id)) return false;
    return true;
  });

  const pkgMap = {};
  packageItems.forEach(p => p.item_ids.forEach(iid => pkgMap[iid] = p.pkg_name));

  const fmt = v => v != null ? Number(v).toLocaleString('zh-CN',{minimumFractionDigits:2}) : '—';
  let html = '';
  rows.forEach(it => {
    const tagClass = it.status==='启用' ? 'tag-green' : 'tag-default';
    const pkgName = pkgMap[it.id] || '<span style="color:#ccc;">—</span>';
    const selClass = selectedSingleIds.has(it.id) ? ' row-selected' : '';
    html += `<tr class="${selClass}" id="srow_${it.id}">
      <td><input type="checkbox" ${selectedSingleIds.has(it.id)?'checked':''} onchange="toggleSelectSingle(${it.id})"></td>
      <td>${it.item_name}</td>
      <td>${getBizTypePath(it.biz_type_id)}</td>
      <td>${it.test_standard||'—'}</td>
      <td>${it.test_method||'—'}</td>
      <td><span class="tag tag-blue">${it.price_type}</span></td>
      <td class="price-tag">${fmt(it.unit_price)}</td>
      <td>${it.unit||'—'}</td>
      <td>${pkgName}</td>
      <td><span class="tag ${tagClass}">${it.status}</span></td>
      <td>
        <button class="btn btn-ghost btn-sm" onclick="showItemModal('edit',${it.id})">编辑</button>
        <button class="btn btn-ghost btn-sm btn-danger" onclick="deleteSingleItem(${it.id})">删除</button>
      </td>
    </tr>`;
  });
  document.getElementById('singleTableBody').innerHTML = html || '<tr><td colspan="11" style="text-align:center;color:#ccc;padding:24px;">暂无数据</td></tr>';
  document.getElementById('singleTotalCount').textContent = rows.length;
  updateSingleBatchBar();
}

function toggleSelectSingle(id) {
  if (selectedSingleIds.has(id)) selectedSingleIds.delete(id);
  else selectedSingleIds.add(id);
  renderSingleTable();
}

function toggleSelectAllSingle(el) {
  if (el.checked) {
    singleItems.forEach(it => selectedSingleIds.add(it.id));
  } else {
    selectedSingleIds.clear();
  }
  renderSingleTable();
}

function updateSingleBatchBar() {
  const bar = document.getElementById('singleBatchBar');
  const cnt = document.getElementById('singleSelectedCount');
  cnt.textContent = selectedSingleIds.size;
  if (selectedSingleIds.size >= 2) {
    bar.classList.add('show');
  } else {
    bar.classList.remove('show');
  }
}

// ============ 打包项价格表 ============
function renderPackageTable() {
  const keyword = (document.getElementById('pPkgName').value || '').toLowerCase();
  const status = document.getElementById('pStatus').value;

  let rows = packageItems.filter(p => {
    if (keyword && !p.pkg_name.toLowerCase().includes(keyword)) return false;
    if (status && p.status !== status) return false;
    if (pkgBizTypeFilter.size > 0 && !pkgBizTypeFilter.has(p.biz_type_id)) return false;
    return true;
  });

  const fmt = v => v != null ? Number(v).toLocaleString('zh-CN',{minimumFractionDigits:2}) : '—';
  let html = '';
  rows.forEach(p => {
    const tagClass = p.status==='启用' ? 'tag-green' : 'tag-default';
    const selClass = selectedPackageIds.has(p.id) ? ' row-selected' : '';
    const children = p.item_ids.map(iid => singleItems.find(s => s.id===iid)).filter(Boolean);
    html += `<tr class="${selClass}" id="prow_${p.id}">
      <td><input type="checkbox" ${selectedPackageIds.has(p.id)?'checked':''} onchange="toggleSelectPackage(${p.id})"></td>
      <td><span class="expander-btn" onclick="togglePkgExpand(${p.id})">▶</span></td>
      <td><strong>${p.pkg_name}</strong></td>
      <td>${getBizTypePath(p.biz_type_id)}</td>
      <td class="package-price">${fmt(p.package_price)}</td>
      <td>${p.unit||'元/组'}</td>
      <td>${children.length} 项</td>
      <td><span class="tag ${tagClass}">${p.status}</span></td>
      <td>
        <button class="btn btn-ghost btn-sm" onclick="showPackageModal('edit',${p.id})">编辑</button>
        <button class="btn btn-ghost btn-sm btn-danger" onclick="deletePackageItem(${p.id})">删除</button>
      </td>
    </tr>`;
    // Sub rows for children
    children.forEach(c => {
      html += `<tr class="sub-row" id="psub_${p.id}_${c.id}">
        <td></td><td></td>
        <td colspan="2">├ ${c.item_name} / ${c.test_standard||'—'} / ${c.test_method||'—'}</td>
        <td>${fmt(c.unit_price)}</td><td>${c.unit||'—'}</td><td></td><td></td><td></td>
      </tr>`;
    });
  });
  document.getElementById('packageTableBody').innerHTML = html || '<tr><td colspan="9" style="text-align:center;color:#ccc;padding:24px;">暂无数据</td></tr>';
  document.getElementById('packageTotalCount').textContent = rows.length;
}

function togglePkgExpand(pkgId) {
  const p = packageItems.find(x => x.id === pkgId);
  if (!p) return;
  p.item_ids.forEach(iid => {
    const sub = document.getElementById('psub_'+pkgId+'_'+iid);
    if (sub) sub.classList.toggle('show');
  });
}

function toggleSelectPackage(id) {
  if (selectedPackageIds.has(id)) selectedPackageIds.delete(id);
  else selectedPackageIds.add(id);
  renderPackageTable();
  updatePkgBatchBar();
}

function toggleSelectAllPackage(el) {
  if (el.checked) {
    packageItems.forEach(p => selectedPackageIds.add(p.id));
  } else {
    selectedPackageIds.clear();
  }
  renderPackageTable();
  updatePkgBatchBar();
}

function updatePkgBatchBar() {
  const bar = document.getElementById('pkgBatchBar');
  document.getElementById('pkgSelectedCount').textContent = selectedPackageIds.size;
  if (selectedPackageIds.size > 0) bar.classList.add('show');
  else bar.classList.remove('show');
}

// ============ 单项 CRUD ============
function closeItemDrawer() { document.getElementById('itemDrawer').classList.remove('show'); }
function closePackageDrawer() { document.getElementById('packageDrawer').classList.remove('show'); }

function showItemModal(type, id) {
  document.getElementById('itemDrawerTitle').textContent = type==='add' ? '新增报价' : '编辑报价';
  // Populate biz type dropdown
  const sel = document.getElementById('fBizType');
  sel.innerHTML = '<option value="">请选择</option>' + getAllBizTypeOptions().map(o => `<option value="${o.value}">${'　'.repeat(o.indent)+o.label}</option>`).join('');
  if (type === 'edit' && id) {
    const it = singleItems.find(x => x.id === id);
    if (it) {
      document.getElementById('fItemName').value = it.item_name;
      sel.value = it.biz_type_id;
      document.getElementById('fStandard').value = it.test_standard||'';
      document.getElementById('fMethod').value = it.test_method||'';
      document.getElementById('fPriceType').value = it.price_type;
      document.getElementById('fUnit').value = it.unit||'';
      document.getElementById('fPrice').value = it.unit_price;
      document.getElementById('fLimit').value = '';
      document.getElementById('fSampleRemark').value = '';
      document.getElementById('itemDrawer')._editId = id;
    }
  } else {
    document.getElementById('itemDrawer')._editId = null;
    document.getElementById('fItemName').value = '';
    sel.value = '';
    document.getElementById('fStandard').value = '';
    document.getElementById('fMethod').value = '';
    document.getElementById('fPriceType').value = '单价';
    document.getElementById('fUnit').value = '';
    document.getElementById('fPrice').value = '';
    document.getElementById('fLimit').value = '';
    document.getElementById('fSampleRemark').value = '';
  }
  document.getElementById('itemDrawer').classList.add('show');
}

function saveItem() {
  const name = document.getElementById('fItemName').value.trim();
  const bizType = document.getElementById('fBizType').value;
  const price = document.getElementById('fPrice').value.trim();
  if (!name) { alert('请输入检测项目'); return; }
  if (!bizType) { alert('请选择业务类型'); return; }
  if (!price) { alert('请输入单价'); return; }

  const data = {
    id: document.getElementById('itemDrawer')._editId || (++nextId),
    item_name: name,
    biz_type_id: bizType,
    test_standard: document.getElementById('fStandard').value.trim(),
    test_method: document.getElementById('fMethod').value.trim(),
    price_type: document.getElementById('fPriceType').value,
    unit_price: price,
    unit: document.getElementById('fUnit').value.trim(),
    status: '启用',
    pkg_id: null,
  };

  if (document.getElementById('itemDrawer')._editId) {
    const idx = singleItems.findIndex(x => x.id === data.id);
    if (idx >= 0) { singleItems[idx] = { ...singleItems[idx], ...data }; }
  } else {
    singleItems.push(data);
  }
  closeItemDrawer();
  renderSingleTable();
}

function deleteSingleItem(id) {
  if (!confirm('确定删除？')) return;
  // Remove from packages first
  packageItems.forEach(p => {
    p.item_ids = p.item_ids.filter(iid => iid !== id);
  });
  const idx = singleItems.findIndex(x => x.id === id);
  if (idx >= 0) singleItems.splice(idx, 1);
  renderSingleTable();
  renderPackageTable();
}

function batchDeleteSingle() {
  if (selectedSingleIds.size === 0) { alert('请先勾选'); return; }
  if (!confirm(`确定删除选中的 ${selectedSingleIds.size} 项？`)) return;
  packageItems.forEach(p => {
    p.item_ids = p.item_ids.filter(iid => !selectedSingleIds.has(iid));
  });
  for (let i = singleItems.length - 1; i >= 0; i--) {
    if (selectedSingleIds.has(singleItems[i].id)) singleItems.splice(i, 1);
  }
  selectedSingleIds.clear();
  renderSingleTable();
  renderPackageTable();
}

function batchEnableSingle() {
  if (selectedSingleIds.size === 0) { alert('请先勾选'); return; }
  singleItems.forEach(it => { if (selectedSingleIds.has(it.id)) it.status = '启用'; });
  selectedSingleIds.clear();
  renderSingleTable();
}

// ============ 生成打包价 ============
let pkgSelectedIds = new Set(); // 打包浮层中当前已选的项目ID

function generatePackage() {
  if (selectedSingleIds.size < 2) { alert('请至少勾选2个检测项目'); return; }
  showPackageModal('add', null, Array.from(selectedSingleIds));
}

function showPackageModal(type, id, preSelectedIds) {
  document.getElementById('packageDrawerTitle').textContent = type==='add' ? '新增打包价' : '编辑打包价';
  document.getElementById('pkgSearchInput').value = ''; // 清空搜索

  const sel = document.getElementById('fPkgBizType');
  sel.innerHTML = '<option value="">请选择</option>' + getAllBizTypeOptions().map(o => `<option value="${o.value}">${'　'.repeat(o.indent)+o.label}</option>`).join('');

  // 初始化已选ID集合
  const initIds = preSelectedIds || (type==='edit' && id ? (packageItems.find(x=>x.id===id)||{}).item_ids || [] : []);
  pkgSelectedIds = new Set(initIds);

  if (type === 'edit' && id) {
    const p = packageItems.find(x => x.id === id);
    if (p) {
      document.getElementById('fPkgName').value = p.pkg_name;
      sel.value = p.biz_type_id;
      document.getElementById('fPkgPrice').value = p.package_price;
      document.getElementById('fPkgUnit').value = p.unit||'元/组';
      document.getElementById('packageDrawer')._editId = id;
    }
  } else {
    document.getElementById('packageDrawer')._editId = null;
    document.getElementById('fPkgName').value = '';
    sel.value = '';
    document.getElementById('fPkgPrice').value = '';
    document.getElementById('fPkgUnit').value = '元/组';
  }

  renderPkgSelected();
  renderPkgItems();
  document.getElementById('packageDrawer').classList.add('show');
}

function renderPkgSelected() {
  const list = document.getElementById('pkgSelectedList');
  const countEl = document.getElementById('pkgSelectedCount');
  countEl.textContent = pkgSelectedIds.size + '项';

  if (pkgSelectedIds.size === 0) {
    list.innerHTML = '<div class="empty-hint">暂未选择（至少勾选2项）</div>';
    return;
  }
  const items = singleItems.filter(it => pkgSelectedIds.has(it.id));
  list.innerHTML = items.map(it =>
    `<div class="pkg-selected-row">
      <div class="sel-info">
        <span class="sel-name">${it.item_name}</span>
        <span class="sel-meta">${it.test_standard||'—'} · ${it.test_method||'—'} · ${getBizTypePath(it.biz_type_id)}</span>
      </div>
      <span class="sel-price">¥${it.unit_price}/${it.unit||'样'}</span>
      <button class="sel-remove" onclick="togglePkgItem(${it.id})" title="移除">×</button>
    </div>`
  ).join('');
}

function togglePkgItem(itemId) {
  if (pkgSelectedIds.has(itemId)) {
    pkgSelectedIds.delete(itemId);
  } else {
    pkgSelectedIds.add(itemId);
  }
  renderPkgSelected();
  renderPkgItems();
}

function renderPkgItems() {
  const container = document.getElementById('pkgItemScroll');
  const searchText = (document.getElementById('pkgSearchInput').value || '').trim().toLowerCase();

  // 筛选启用 + 搜索匹配
  const availableItems = singleItems.filter(it => it.status === '启用');
  const filtered = availableItems.filter(it => {
    if (!searchText) return true;
    const bizPath = getBizTypePath(it.biz_type_id).toLowerCase();
    return (it.item_name||'').toLowerCase().indexOf(searchText) >= 0
        || (it.test_standard||'').toLowerCase().indexOf(searchText) >= 0
        || (it.test_method||'').toLowerCase().indexOf(searchText) >= 0
        || bizPath.indexOf(searchText) >= 0;
  });

  if (filtered.length === 0) {
    container.innerHTML = '<div class="pkg-no-result">' + (searchText ? '未找到匹配的检测项目' : '暂无可选项目') + '</div>';
    return;
  }

  const groups = {};
  filtered.forEach(it => {
    const path = getBizTypePath(it.biz_type_id);
    if (!groups[path]) groups[path] = [];
    groups[path].push(it);
  });

  const groupNames = Object.keys(groups);
  groupNames.sort((a, b) => {
    const aHas = groups[a].some(it => pkgSelectedIds.has(it.id));
    const bHas = groups[b].some(it => pkgSelectedIds.has(it.id));
    if (aHas && !bHas) return -1;
    if (!aHas && bHas) return 1;
    return a.localeCompare(b, 'zh-CN');
  });

  let html = '';
  groupNames.forEach(path => {
    html += `<div class="pkg-item-group"><div class="pkg-item-group-title">${path}</div>`;
    groups[path].forEach(it => {
      const checked = pkgSelectedIds.has(it.id);
      html += `<div class="pkg-item-row${checked?' selected':''}" onclick="togglePkgItem(${it.id})">
        <input type="checkbox" ${checked?'checked':''} onclick="event.stopPropagation();togglePkgItem(${it.id})">
        <div class="item-detail">
          <div class="item-detail-name">${it.item_name}</div>
          <div class="item-detail-meta">${it.test_standard||'—'} · ${it.test_method||'—'}</div>
        </div>
        <span class="item-price-tag">¥${it.unit_price}/${it.unit||'样'}</span>
      </div>`;
    });
    html += '</div>';
  });
  container.innerHTML = html;
}

function savePackage() {
  const name = document.getElementById('fPkgName').value.trim();
  const bizType = document.getElementById('fPkgBizType').value;
  const price = document.getElementById('fPkgPrice').value.trim();
  if (!name) { alert('请输入打包名称'); return; }
  if (!bizType) { alert('请选择业务类型'); return; }
  if (!price) { alert('请输入打包价'); return; }

  const checked = Array.from(pkgSelectedIds);
  if (checked.length < 2) { alert('请至少选择2个检测项目'); return; }

  const data = {
    id: document.getElementById('packageDrawer')._editId || (++nextId),
    pkg_name: name,
    biz_type_id: bizType,
    package_price: parseFloat(price),
    unit: document.getElementById('fPkgUnit').value.trim() || '元/组',
    status: '启用',
    item_ids: checked,
  };

  if (document.getElementById('packageDrawer')._editId) {
    const idx = packageItems.findIndex(x => x.id === data.id);
    if (idx >= 0) {
      // Remove old pkg_id from items, set new ones
      const old = packageItems[idx];
      singleItems.forEach(it => { if (old.item_ids.includes(it.id)) it.pkg_id = null; });
      packageItems[idx] = data;
    }
  } else {
    packageItems.push(data);
  }
  // Update pkg_id on items
  singleItems.forEach(it => { it.pkg_id = null; });
  packageItems.forEach(p => p.item_ids.forEach(iid => {
    const s = singleItems.find(x => x.id === iid);
    if (s) s.pkg_id = p.id;
  }));

  selectedSingleIds.clear();
  closePackageDrawer();
  renderSingleTable();
  renderPackageTable();
}

function deletePackageItem(id) {
  if (!confirm('确定删除？关联的单项价格不会被删除，仅取消打包关系。')) return;
  // Set items' pkg_id to null
  const p = packageItems.find(x => x.id === id);
  if (p) {
    p.item_ids.forEach(iid => { const s = singleItems.find(x => x.id === iid); if (s) s.pkg_id = null; });
  }
  const idx = packageItems.findIndex(x => x.id === id);
  if (idx >= 0) packageItems.splice(idx, 1);
  renderSingleTable();
  renderPackageTable();
}

function batchDeletePackage() {
  if (selectedPackageIds.size === 0) { alert('请先勾选'); return; }
  if (!confirm(`确定删除选中的 ${selectedPackageIds.size} 个打包项？单项价格不会被删除。`)) return;
  for (let i = packageItems.length - 1; i >= 0; i--) {
    if (selectedPackageIds.has(packageItems[i].id)) {
      packageItems[i].item_ids.forEach(iid => { const s = singleItems.find(x => x.id === iid); if (s) s.pkg_id = null; });
      packageItems.splice(i, 1);
    }
  }
  selectedPackageIds.clear();
  renderSingleTable();
  renderPackageTable();
}

function batchEnablePackage() {
  if (selectedPackageIds.size === 0) { alert('请先勾选'); return; }
  packageItems.forEach(p => { if (selectedPackageIds.has(p.id)) p.status = '启用'; });
  selectedPackageIds.clear();
  renderPackageTable();
}

document.querySelectorAll('.drawer-overlay').forEach(overlay => {
  overlay.addEventListener('click', function(e) { if (e.target === this) this.classList.remove('show'); });

// ============ Export ============
function exportPriceData() {
  var activeTab = document.querySelector('.page-tab.active');
  var tabName = activeTab ? activeTab.getAttribute('onclick').match(/'(\w+)'/)[1] : 'single';
  var now = new Date().toISOString().slice(0,10);
  var filename = (tabName==='single'?'单项价格':'打包项价格') + '_' + now + '.csv';
  
  var header, rows;
  if (tabName === 'single') {
    var keyword = (document.getElementById('sItemName').value || '').toLowerCase();
    var standard = (document.getElementById('sStandard').value || '').toLowerCase();
    var priceType = document.getElementById('sPriceType').value;
    var status = document.getElementById('sStatus').value;
    var items = singleItems.filter(function(it) {
      if (keyword && !it.item_name.toLowerCase().includes(keyword)) return false;
      if (standard && !(it.test_standard||'').toLowerCase().includes(standard)) return false;
      if (priceType && it.price_type !== priceType) return false;
      if (status && it.status !== status) return false;
      if (window.singleBizTypeFilter && window.singleBizTypeFilter.size > 0 && !window.singleBizTypeFilter.has(it.biz_type_id)) return false;
      return true;
    });
    header = '\uFEFF序号,检测项目,检验方法,检测标准,业务类型,报价类型,单价,单位,状态';
    rows = items.map(function(it, i) {
      return [(i+1), it.item_name, it.test_method||'', it.test_standard||'', getBizTypePath(it.biz_type_id), it.price_type, it.unit_price, it.unit||'', it.status].map(csvCell).join(',');
    });
  } else {
    var pkeyword = (document.getElementById('pPkgName').value || '').toLowerCase();
    var pstatus = document.getElementById('pStatus').value;
    var pitems = packageItems.filter(function(p) {
      if (pkeyword && !p.pkg_name.toLowerCase().includes(pkeyword)) return false;
      if (pstatus && p.status !== pstatus) return false;
      return true;
    });
    header = '\uFEFF序号,打包名称,打包内容,业务类型,打包价,单位,状态';
    rows = pitems.map(function(it, i) {
      var childNames = it.item_ids.map(function(iid) {
        var s = singleItems.find(function(x) { return x.id === iid; });
        return s ? s.item_name : '';
      }).filter(Boolean).join('；');
      return [(i+1), it.pkg_name, childNames, getBizTypePath(it.biz_type_id), it.package_price, it.unit||'元/组', it.status].map(csvCell).join(',');
    });
  }
  var csv = header + '\n' + rows.join('\n');
  var blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}
function csvCell(val) { var s=String(val==null?'':val); return /[,\n"]/.test(s) ? '"'+s.replace(/"/g,'""')+'"' : s; }
