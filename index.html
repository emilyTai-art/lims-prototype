<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIMS 商务阶段 - 原型演示</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:#f0f2f5;min-height:100vh;}
.header{background:#fff;padding:20px 40px;box-shadow:0 1px 4px rgba(0,0,0,.08);}
.header h1{font-size:20px;color:#1a1a1a;font-weight:600;}
.header p{font-size:13px;color:#999;margin-top:4px;}
.container{max-width:1100px;margin:32px auto;padding:0 20px;}
.group{margin-bottom:24px;}
.group-title{font-size:16px;font-weight:600;color:#333;margin-bottom:12px;padding-left:12px;border-left:3px solid #1890ff;}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;}
.card{display:block;background:#fff;padding:18px 20px;border-radius:6px;text-decoration:none;color:#333;box-shadow:0 1px 3px rgba(0,0,0,.06);transition:all .2s;}
.card:hover{box-shadow:0 3px 12px rgba(0,0,0,.10);transform:translateY(-1px);}
.card .name{font-size:15px;font-weight:500;color:#1890ff;margin-bottom:4px;}
.card .desc{font-size:12px;color:#999;}
</style>
</head>

</div>
